<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SF6 LP Tracker — 管理者画面</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#060e1a;color:#c9d8f0;font-family:'Segoe UI',sans-serif;min-height:100vh;}
h1{font-size:1.2rem;color:#00f0ff;letter-spacing:.06em;}
.header{background:#0a1628;border-bottom:1px solid rgba(0,240,255,0.15);padding:14px 24px;display:flex;align-items:center;gap:12px;}
.badge{font-size:10px;background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.35);color:#ef4444;border-radius:4px;padding:2px 8px;letter-spacing:.04em;}
.main{max-width:900px;margin:40px auto;padding:0 20px;}

/* ログイン */
#login-section{display:flex;justify-content:center;align-items:center;min-height:70vh;}
.login-box{background:#0d1b2a;border:1px solid rgba(0,240,255,0.2);border-radius:16px;padding:36px 32px;width:100%;max-width:360px;}
.login-box h2{color:#00f0ff;font-size:1rem;margin-bottom:24px;text-align:center;letter-spacing:.05em;}
.form-label{font-size:11px;color:#7a9ab8;margin-bottom:5px;display:block;}
.form-input{width:100%;padding:9px 12px;background:#060e1a;border:1px solid rgba(0,240,255,0.25);border-radius:8px;color:#c9d8f0;font-size:14px;margin-bottom:14px;}
.form-input:focus{outline:none;border-color:rgba(0,240,255,0.6);}
.btn-primary{width:100%;padding:10px;background:rgba(0,240,255,0.15);border:1px solid rgba(0,240,255,0.4);color:#00f0ff;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;letter-spacing:.03em;}
.btn-primary:hover{background:rgba(0,240,255,0.25);}
.login-error{color:#ef4444;font-size:12px;margin-top:10px;text-align:center;display:none;}

/* 管理画面 */
#admin-section{display:none;}
.section-title{font-size:13px;color:#7a9ab8;font-weight:600;letter-spacing:.04em;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.07);}
.toolbar{display:flex;gap:10px;margin-bottom:18px;align-items:center;flex-wrap:wrap;}
.count-badge{font-size:12px;color:#7a9ab8;margin-left:auto;}
.btn-reload{padding:6px 14px;background:rgba(0,240,255,0.08);border:1px solid rgba(0,240,255,0.25);color:#00f0ff;border-radius:6px;cursor:pointer;font-size:12px;}
.btn-reload:hover{background:rgba(0,240,255,0.18);}
.btn-logout{padding:6px 14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);color:#7a9ab8;border-radius:6px;cursor:pointer;font-size:12px;}

/* テーブル */
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid rgba(255,255,255,0.08);}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{background:#0d1b2a;padding:10px 14px;text-align:left;font-size:11px;color:#7a9ab8;font-weight:600;letter-spacing:.04em;white-space:nowrap;}
tbody tr{border-top:1px solid rgba(255,255,255,0.05);}
tbody tr:hover{background:rgba(0,240,255,0.04);}
td{padding:10px 14px;vertical-align:middle;}
.td-name{color:#00f0ff;font-weight:600;font-family:monospace;}
.td-pw{font-family:monospace;color:#ffd700;}
.td-date{color:#7a9ab8;font-size:12px;}
.btn-reset{padding:4px 10px;background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.3);color:#fbbf24;border-radius:5px;cursor:pointer;font-size:11px;white-space:nowrap;}
.btn-reset:hover{background:rgba(251,191,36,0.2);}
.btn-del{padding:4px 10px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#ef4444;border-radius:5px;cursor:pointer;font-size:11px;white-space:nowrap;margin-left:4px;}
.btn-del:hover{background:rgba(239,68,68,0.2);}
.empty-row td{color:#7a9ab8;text-align:center;padding:30px;}

/* リセットモーダル */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;align-items:center;justify-content:center;}
.modal-box{background:#0d1b2a;border:1px solid rgba(0,240,255,0.2);border-radius:14px;padding:28px 24px;width:100%;max-width:340px;}
.modal-title{font-size:14px;font-weight:700;color:#fbbf24;margin-bottom:16px;}
.modal-label{font-size:11px;color:#7a9ab8;margin-bottom:5px;}
.modal-input{width:100%;padding:8px 12px;background:#060e1a;border:1px solid rgba(0,240,255,0.25);border-radius:8px;color:#c9d8f0;font-size:14px;margin-bottom:14px;}
.modal-error{color:#ef4444;font-size:11px;margin-bottom:10px;display:none;}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;}
.btn-cancel{padding:7px 16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);color:#7a9ab8;border-radius:6px;cursor:pointer;font-size:13px;}
.btn-confirm{padding:7px 16px;background:rgba(251,191,36,0.15);border:1px solid rgba(251,191,36,0.4);color:#fbbf24;border-radius:6px;cursor:pointer;font-size:13px;}
.btn-confirm:disabled{opacity:0.4;cursor:default;}

/* トースト */
.toast{position:fixed;bottom:24px;right:24px;background:#0d1b2a;border:1px solid rgba(0,240,255,0.3);border-left:3px solid #00f0ff;color:#c9d8f0;padding:10px 16px;border-radius:8px;font-size:13px;z-index:200;animation:fadeIn .2s;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
</style>
</head>
<body>

<div class="header">
    <h1>SF6 LP Tracker</h1>
    <span class="badge">ADMIN</span>
    <span id="admin-name-badge" style="display:none;margin-left:auto;font-size:12px;color:#7a9ab8;">ログイン中: <span style="color:#00f0ff;">admin</span></span>
</div>

<!-- ログイン -->
<div id="login-section">
    <div class="login-box">
        <h2>🔐 管理者ログイン</h2>
        <label class="form-label">管理者ID</label>
        <input type="text" id="adm-id" class="form-input" placeholder="admin" autocomplete="username">
        <label class="form-label">パスワード</label>
        <input type="password" id="adm-pw" class="form-input" placeholder="••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
        <button class="btn-primary" onclick="doLogin()">ログイン</button>
        <div id="login-error" class="login-error"></div>
    </div>
</div>

<!-- 管理画面 -->
<div id="admin-section">
    <div class="main">
        <div class="section-title">ユーザー管理</div>
        <div class="toolbar">
            <button class="btn-reload" onclick="loadUsers()">🔄 再読み込み</button>
            <span class="count-badge" id="user-count"></span>
            <button class="btn-logout" onclick="doLogout()">ログアウト</button>
        </div>
        <div class="tbl-wrap">
            <table>
                <thead>
                    <tr>
                        <th>ルームID</th>
                        <th>パスワード</th>
                        <th>登録日時</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="user-tbody"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- パスワードリセットモーダル -->
<div class="modal-bg" id="reset-modal" onclick="if(event.target===this)closeReset()">
    <div class="modal-box">
        <div class="modal-title">🔑 パスワードリセット</div>
        <div style="font-size:12px;color:#7a9ab8;margin-bottom:14px;">対象: <span id="reset-target-label" style="color:#00f0ff;font-weight:700;"></span></div>
        <div class="modal-label">新しいパスワード（5文字以上）</div>
        <input type="text" id="reset-pw-input" class="modal-input" placeholder="新しいパスワード" oninput="validateResetPw()">
        <div class="modal-error" id="reset-error"></div>
        <div class="modal-btns">
            <button class="btn-cancel" onclick="closeReset()">キャンセル</button>
            <button class="btn-confirm" id="reset-submit" onclick="submitReset()" disabled>変更する</button>
        </div>
    </div>
</div>

<script>
let _adminId = '', _adminPw = '', _resetTarget = '';

async function doLogin() {
    const id = document.getElementById('adm-id').value.trim();
    const pw = document.getElementById('adm-pw').value.trim();
    const errEl = document.getElementById('login-error');
    if (!id || !pw) { errEl.textContent = 'IDとパスワードを入力してください'; errEl.style.display = 'block'; return; }
    const res  = await fetch('/api/admin/login', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({admin_id: id, admin_password: pw})
    });
    const data = await res.json();
    if (!data.ok) { errEl.textContent = data.error || 'ログインに失敗しました'; errEl.style.display = 'block'; return; }
    _adminId = id; _adminPw = pw;
    errEl.style.display = 'none';
    document.getElementById('login-section').style.display = 'none';
    document.getElementById('admin-section').style.display = 'block';
    document.getElementById('admin-name-badge').style.display = 'block';
    loadUsers();
}

function doLogout() {
    _adminId = ''; _adminPw = '';
    document.getElementById('login-section').style.display = 'flex';
    document.getElementById('admin-section').style.display = 'none';
    document.getElementById('admin-name-badge').style.display = 'none';
    document.getElementById('adm-pw').value = '';
}

async function loadUsers() {
    const res  = await fetch('/api/admin/users', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({admin_id: _adminId, admin_password: _adminPw})
    });
    const data = await res.json();
    if (!data.ok) { showToast('読み込みエラー: ' + (data.error || '')); return; }
    const tbody = document.getElementById('user-tbody');
    document.getElementById('user-count').textContent = `${data.users.length} ユーザー`;
    if (!data.users.length) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="4">ユーザーがいません</td></tr>';
        return;
    }
    tbody.innerHTML = data.users.map(u => `
        <tr>
            <td class="td-name">${esc(u.name)}</td>
            <td class="td-pw">${esc(u.password)}</td>
            <td class="td-date">${esc(u.created_at)}</td>
            <td style="white-space:nowrap;">
                <button class="btn-reset" onclick="openReset('${esc(u.name)}')">PW変更</button>
                <button class="btn-del" onclick="deleteRoom('${esc(u.name)}')">削除</button>
            </td>
        </tr>
    `).join('');
}

function openReset(name) {
    _resetTarget = name;
    document.getElementById('reset-target-label').textContent = name;
    document.getElementById('reset-pw-input').value = '';
    document.getElementById('reset-error').style.display = 'none';
    document.getElementById('reset-submit').disabled = true;
    document.getElementById('reset-modal').style.display = 'flex';
    setTimeout(() => document.getElementById('reset-pw-input').focus(), 50);
}

function closeReset() {
    document.getElementById('reset-modal').style.display = 'none';
}

function validateResetPw() {
    const pw = document.getElementById('reset-pw-input').value;
    const errEl = document.getElementById('reset-error');
    const btn   = document.getElementById('reset-submit');
    if (pw.length > 0 && pw.length < 5) {
        errEl.textContent = '5文字以上で入力してください'; errEl.style.display = 'block';
        btn.disabled = true; return;
    }
    errEl.style.display = 'none';
    btn.disabled = pw.length < 5;
}

async function submitReset() {
    const pw = document.getElementById('reset-pw-input').value.trim();
    const res = await fetch('/api/admin/reset-password', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({admin_id: _adminId, admin_password: _adminPw, target_name: _resetTarget, new_password: pw})
    });
    const data = await res.json();
    if (!data.ok) {
        document.getElementById('reset-error').textContent = data.error || 'エラー';
        document.getElementById('reset-error').style.display = 'block'; return;
    }
    closeReset();
    showToast(`✅ ${_resetTarget} のパスワードを変更しました`);
    loadUsers();
}

async function deleteRoom(name) {
    if (!confirm(`「${name}」を削除します。\nこのルームのデータはすべて失われます。よろしいですか？`)) return;
    const res = await fetch('/api/admin/delete-room', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({admin_id: _adminId, admin_password: _adminPw, target_name: name})
    });
    const data = await res.json();
    if (!data.ok) { showToast('削除エラー: ' + (data.error || '')); return; }
    showToast(`🗑️ ${name} を削除しました`);
    loadUsers();
}

function showToast(msg) {
    const t = document.createElement('div');
    t.className = 'toast'; t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
}

function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Enterキーでログイン
document.getElementById('adm-id').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('adm-pw').focus(); });
</script>
</body>
</html>
