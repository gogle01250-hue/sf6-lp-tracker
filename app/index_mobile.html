<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SF6 Tracker Mobile</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g1' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%2300f0ff'/%3E%3Cstop offset='100%25' stop-color='%230070ff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='7' fill='%23001122'/%3E%3Cpolygon points='16,3 20,13 30,13 22,19 25,29 16,23 7,29 10,19 2,13 12,13' fill='url(%23g1)' opacity='0.9'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Outfit:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
/* ===== DESIGN TOKENS ===== */
:root {
    --bg-main: #0b0c10;
    --bg-panel: rgba(22,26,35,0.95);
    --bg-panel-solid: #161a23;
    --border-color: rgba(255,255,255,0.07);
    --color-orange: #ff6a00;
    --color-orange-glow: rgba(255,106,0,0.4);
    --color-cyan: #00f0ff;
    --color-cyan-glow: rgba(0,240,255,0.3);
    --color-yellow: #ffcc00;
    --text-primary: #f0f2f7;
    --text-secondary: #9aa0b0;
    --text-muted: #626875;
    --radius-lg: 16px;
    --radius-md: 10px;
    --radius-sm: 6px;
    --font-heading: 'Orbitron','Outfit',sans-serif;
    --font-body: 'Outfit','Noto Sans JP',sans-serif;
    --header-h: 52px;
    --nav-h: 60px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    background: var(--bg-main);
    color: var(--text-primary);
    font-family: var(--font-body);
    -webkit-text-size-adjust: 100%;
    overscroll-behavior: none;
    user-select: none;
}

/* ===== HEADER ===== */
.m-header {
    position: fixed; top:0; left:0; right:0; z-index:100;
    height: calc(var(--header-h) + var(--safe-top));
    padding-top: var(--safe-top);
    background: rgba(13,17,23,0.97);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border-color);
    display: flex; align-items: center;
    padding-left:14px; padding-right:14px; gap:10px;
}
.m-logo {
    font-family: var(--font-heading);
    font-size:1.1rem; font-weight:900;
    background: linear-gradient(90deg,#fff,#dbe1e8);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.m-version-badge {
    font-size:10px; background:rgba(0,240,255,0.12);
    color:var(--color-cyan); border:1px solid rgba(0,240,255,0.3);
    border-radius:4px; padding:2px 6px;
}
.m-room-btn {
    margin-left:auto; display:flex; align-items:center; gap:6px;
    background:rgba(255,255,255,0.06); border:1px solid var(--border-color);
    border-radius:8px; padding:6px 10px; cursor:pointer;
    font-size:12px; color:var(--text-secondary);
    font-family:var(--font-body);
    max-width:140px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}

/* ===== BODY AREA ===== */
.m-body {
    position: fixed;
    top: calc(var(--header-h) + var(--safe-top));
    bottom: calc(var(--nav-h) + var(--safe-bottom));
    left:0; right:0;
    overflow: hidden;
}

.tab-panel {
    position:absolute; inset:0;
    overflow-y:auto; -webkit-overflow-scrolling:touch;
    display:none;
    padding-bottom:16px;
}
.tab-panel.active { display:block; }

/* ===== BOTTOM NAV ===== */
.m-bottom-nav {
    position:fixed; bottom:0; left:0; right:0; z-index:100;
    height: calc(var(--nav-h) + var(--safe-bottom));
    padding-bottom: var(--safe-bottom);
    background: rgba(13,17,23,0.98);
    border-top: 1px solid var(--border-color);
    display:flex;
}
.nav-btn {
    flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:4px; background:none; border:none;
    color:var(--text-muted); cursor:pointer;
    font-size:10px; font-family:var(--font-body);
    transition:color 0.2s;
}
.nav-btn i { font-size:20px; }
.nav-btn.active { color:var(--color-cyan); }
.nav-btn.active i { filter:drop-shadow(0 0 6px var(--color-cyan-glow)); }

/* ===== FAB ===== */
.fab {
    position:fixed;
    bottom: calc(var(--nav-h) + var(--safe-bottom) + 16px);
    right:16px; z-index:50;
    width:52px; height:52px; border-radius:50%;
    background: linear-gradient(135deg,#00f0ff,#0070f3);
    border:none; color:#000; font-size:26px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    box-shadow: 0 4px 20px rgba(0,240,255,0.45);
    transition: transform 0.15s;
}
.fab:active { transform:scale(0.93); }
.fab.hidden { display:none; }

/* ===== COMBO CARDS ===== */
.filter-bar {
    padding:10px 12px;
    background:rgba(15,23,42,0.97);
    border-bottom:1px solid var(--border-color);
    position:sticky; top:0; z-index:10;
    display:flex; gap:8px; align-items:center;
}
.m-select {
    flex:1; background:#1e293b; color:var(--text-primary);
    border:1px solid rgba(255,255,255,0.1); border-radius:8px;
    padding:9px 10px; font-size:13px; font-family:var(--font-body);
}
.combo-cards-list {
    display:flex; flex-direction:column;
    gap:8px; padding:10px 12px;
}
.combo-card-wrap {
    position:relative; overflow:hidden; border-radius:12px;
}
.combo-card-inner {
    background:#111827;
    border:1px solid rgba(255,255,255,0.08);
    border-radius:12px;
    padding:12px 14px;
    transition:transform 0.25s cubic-bezier(.25,.46,.45,.94);
    position:relative; z-index:2;
}
.combo-card-wrap.swiped .combo-card-inner { transform:translateX(-88px); }
.combo-cmd {
    font-family:monospace; font-size:13px;
    color:var(--color-cyan); line-height:1.5;
}
.combo-cmd.short {
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.cmd-expand-btn {
    font-size:11px; color:var(--text-muted);
    background:none; border:none; cursor:pointer;
    padding:2px 0; text-decoration:underline;
    font-family:var(--font-body);
    user-select:none;
}
.combo-meta-row {
    display:flex; flex-wrap:wrap; gap:6px;
    margin-top:8px; align-items:center;
}
.tag-badge {
    font-size:10px; padding:2px 6px; border-radius:4px; border:1px solid;
}
.tag-badge.counter  { color:#4fc3f7; border-color:rgba(79,195,247,.35); background:rgba(79,195,247,.1); }
.tag-badge.pc       { color:#fb923c; border-color:rgba(251,146,60,.35); background:rgba(251,146,60,.1); }
.tag-badge.corner   { color:#ffb347; border-color:rgba(255,179,71,.35); background:rgba(255,179,71,.1); }
.tag-badge.normal   { color:#aaa; border-color:rgba(170,170,170,.3); background:rgba(170,170,170,.07); }
.tag-badge.drev     { color:#a78bfa; border-color:rgba(167,139,250,.35); background:rgba(167,139,250,.1); }
.od-badge {
    background:rgba(168,85,247,0.2); color:#c084fc;
    border:1px solid rgba(168,85,247,0.35);
    border-radius:10px; padding:1px 7px;
    font-size:10px; font-weight:700;
}
.meta-stat { font-size:11px; color:var(--text-muted); }
.meta-stat span { color:var(--text-secondary); }
.combo-memo-text { font-size:11px; color:var(--text-muted); margin-top:5px; }

/* Swipe action buttons */
.swipe-actions {
    position:absolute; right:0; top:0; bottom:0;
    width:88px; display:flex; z-index:1; border-radius:0 12px 12px 0; overflow:hidden;
}
.swipe-action-btn {
    flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:3px; border:none; cursor:pointer; font-size:10px;
    font-family:var(--font-body);
}
.swipe-action-btn i { font-size:16px; }
.swipe-action-btn.sa-edit { background:#1d4ed8; color:white; }
.swipe-action-btn.sa-del  { background:#dc2626; color:white; }

/* ===== BOTTOM SHEET ===== */
.bs-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,0.6);
    z-index:200; display:none;
}
.bs-overlay.show { display:block; }
.bottom-sheet {
    position:fixed; left:0; right:0; bottom:0;
    max-height:92vh;
    background:#111827;
    border-top-left-radius:20px; border-top-right-radius:20px;
    border-top:1px solid rgba(255,255,255,0.1);
    z-index:201;
    transform:translateY(100%);
    transition:transform 0.35s cubic-bezier(.32,.72,0,1);
    display:flex; flex-direction:column;
    padding-bottom:var(--safe-bottom);
}
.bottom-sheet.open { transform:translateY(0); }
.bs-handle {
    width:36px; height:4px;
    background:rgba(255,255,255,0.18);
    border-radius:2px; margin:10px auto 0; flex-shrink:0;
}
.bs-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 16px 8px; flex-shrink:0;
    border-bottom:1px solid rgba(255,255,255,0.05);
}
.bs-title { font-size:14px; font-weight:600; color:var(--text-primary); }
.bs-close {
    background:rgba(255,255,255,0.07); border:none;
    color:var(--text-muted); border-radius:50%;
    width:30px; height:30px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size:14px;
}
.bs-body {
    overflow-y:auto; -webkit-overflow-scrolling:touch;
    padding:10px 14px 16px;
    display:flex; flex-direction:column; gap:10px;
    flex:1;
}
.bs-label { font-size:11px; color:var(--text-muted); margin-bottom:3px; }
.bs-input {
    width:100%; background:#1e293b;
    border:1px solid rgba(255,255,255,0.1);
    border-radius:8px; color:var(--text-primary);
    padding:10px 12px; font-size:13px; font-family:var(--font-body);
}
.bs-input:focus { outline:none; border-color:var(--color-orange); }
.bs-row { display:flex; gap:8px; }
.bs-row .bs-input { flex:1; }
.bs-save-btn {
    background:rgba(0,240,255,0.12);
    border:1px solid rgba(0,240,255,0.4);
    color:var(--color-cyan); border-radius:10px;
    padding:13px; font-size:14px; font-weight:600;
    width:100%; cursor:pointer; font-family:var(--font-body);
}
.bs-save-btn:active { opacity:0.8; }

/* BS tag buttons */
.bs-tag-row { display:flex; gap:6px; flex-wrap:wrap; }
.bs-tag-btn {
    padding:6px 10px; border-radius:6px;
    font-size:11px; cursor:pointer; border:1px solid;
    font-family:var(--font-body); background:rgba(0,0,0,0.2);
}
.bs-tag-btn.t-counter  { color:#4fc3f7; border-color:rgba(79,195,247,.3); }
.bs-tag-btn.t-pc       { color:#fb923c; border-color:rgba(251,146,60,.3); }
.bs-tag-btn.t-corner   { color:#ffb347; border-color:rgba(255,179,71,.3); }
.bs-tag-btn.t-normal   { color:#aaa;    border-color:rgba(170,170,170,.25); }
.bs-tag-btn.t-drev     { color:#a78bfa; border-color:rgba(167,139,250,.3); }
.bs-tag-btn.selected   { box-shadow:0 0 0 1.5px currentColor; background:rgba(255,255,255,0.07); }

/* ===== COMMAND BUILDER ===== */
.cmd-builder {
    background:#0f172a;
    border:1px solid rgba(255,255,255,0.07);
    border-radius:10px; padding:10px;
}
.cmd-section-lbl { font-size:10px; color:var(--text-muted); margin-bottom:5px; }
.dir-grid {
    display:grid; grid-template-columns:repeat(3,44px);
    gap:4px; margin-bottom:6px;
}
.dir-btn {
    width:44px; height:44px;
    background:#1e293b; border:1px solid rgba(255,255,255,0.1);
    border-radius:8px; color:var(--text-secondary);
    font-size:16px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    font-family:var(--font-body);
    -webkit-tap-highlight-color:transparent;
}
.dir-btn:active { background:rgba(0,240,255,0.12); }
.dir-btn.active {
    background:rgba(0,240,255,0.15);
    border-color:var(--color-cyan); color:var(--color-cyan);
}
.tech-group { display:flex; gap:5px; flex-wrap:wrap; }
.tech-btn {
    height:40px; min-width:46px; padding:0 10px;
    background:#1e293b; border:1px solid rgba(255,255,255,0.1);
    border-radius:8px; font-size:12px; cursor:pointer;
    font-family:var(--font-body);
    -webkit-tap-highlight-color:transparent;
}
.tech-btn:active { opacity:0.7; }
.tech-btn.p-type { color:#00d4ff; border-color:rgba(0,212,255,0.25); }
.tech-btn.k-type { color:#7ee8a2; border-color:rgba(126,232,162,0.25); }
.tech-btn.util   { color:var(--color-yellow); border-color:rgba(255,200,0,0.25); }
.tech-btn.danger { color:#ef4444; border-color:rgba(239,68,68,0.3); }
.cmd-preview-box {
    background:#0d1117; border:1px solid rgba(255,255,255,0.08);
    border-radius:6px; padding:8px 10px;
    font-family:monospace; font-size:12px;
    color:var(--color-cyan); min-height:34px;
    word-break:break-all; line-height:1.5;
}

/* ===== RECORD TAB ===== */
.mode-tabs {
    display:flex; padding:10px 12px 0; gap:8px;
}
.mode-tab {
    flex:1; padding:9px; border-radius:8px;
    border:1px solid rgba(255,255,255,0.1);
    background:rgba(0,0,0,0.2);
    color:var(--text-muted); font-size:12px;
    font-family:var(--font-body); cursor:pointer;
    -webkit-tap-highlight-color:transparent;
}
.mode-tab.active {
    background:rgba(255,106,0,0.15);
    border-color:rgba(255,106,0,0.4);
    color:var(--color-orange);
}
.record-form {
    padding:12px; display:flex; flex-direction:column; gap:10px;
}
.form-group { display:flex; flex-direction:column; gap:5px; }
.form-label {
    font-size:11px; color:var(--text-secondary);
    display:flex; align-items:center; gap:5px;
}
.form-label i { color:var(--color-cyan); }
.m-input {
    background:rgba(0,0,0,0.2);
    border:1px solid var(--border-color);
    border-radius:8px; padding:11px 12px;
    color:var(--text-primary); font-size:14px;
    font-family:var(--font-body); width:100%;
}
.m-input:focus { outline:none; border-color:var(--color-orange); }
.form-row { display:flex; gap:8px; }
.form-row .form-group { flex:1; }
.save-btn {
    background:linear-gradient(135deg,#ff6a00,#ee0979);
    border:none; color:white;
    border-radius:10px; padding:14px;
    font-size:14px; font-weight:700;
    font-family:var(--font-body); cursor:pointer; width:100%;
}
/* LP number pad */
.lp-display {
    width:100%; background:#1e293b;
    border:1px solid rgba(255,200,0,0.25); border-radius:8px;
    padding:12px; font-family:var(--font-heading);
    font-size:1.4rem; color:#ffd700;
    text-align:right; min-height:50px;
    display:flex; align-items:center; justify-content:flex-end;
}
.num-pad {
    display:grid; grid-template-columns:repeat(3,1fr); gap:4px;
}
.num-key {
    height:46px; background:#1e293b;
    border:1px solid rgba(255,255,255,0.08);
    border-radius:8px; color:var(--text-primary);
    font-size:18px; font-family:var(--font-body); cursor:pointer;
    -webkit-tap-highlight-color:transparent;
}
.num-key:active { background:#2d3f55; }
.num-key.op { color:var(--color-cyan); font-size:13px; }
.num-key.del-key { color:#ef4444; }
/* CM section */
.cm-wl-display { display:flex; gap:10px; }
.cm-wl-box {
    flex:1; background:#1e293b;
    border-radius:10px; padding:12px; text-align:center;
}
.cm-wl-val {
    font-size:28px; font-weight:700;
    font-family:var(--font-heading);
}
.cm-wl-val.win  { color:var(--color-cyan); }
.cm-wl-val.lose { color:#ef4444; }
.cm-wl-lbl { font-size:11px; color:var(--text-muted); margin-top:2px; }
.cm-adj-row { display:flex; gap:6px; }
.cm-adj-btn {
    flex:1; height:46px;
    border-radius:8px; font-size:14px;
    cursor:pointer; font-family:var(--font-body);
    -webkit-tap-highlight-color:transparent;
}
.cm-adj-btn.wp { background:rgba(0,240,255,0.1); border:1px solid rgba(0,240,255,0.3); color:var(--color-cyan); }
.cm-adj-btn.wm { background:rgba(0,0,0,0.2); border:1px solid var(--border-color); color:var(--text-muted); }
.cm-adj-btn.lp { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); color:#ef4444; }
.cm-adj-btn.lm { background:rgba(0,0,0,0.2); border:1px solid var(--border-color); color:var(--text-muted); }

/* Recent records */
.section-header {
    padding:10px 12px; font-size:11px;
    color:var(--text-muted); font-weight:600;
    letter-spacing:1px; text-transform:uppercase;
    border-bottom:1px solid rgba(255,255,255,0.05);
    display:flex; justify-content:space-between; align-items:center;
    background:rgba(0,0,0,0.15);
}
.record-list { padding:8px 12px; display:flex; flex-direction:column; gap:6px; }
.record-row {
    background:#111827; border:1px solid rgba(255,255,255,0.07);
    border-radius:8px; padding:10px 12px;
    display:flex; align-items:center; gap:8px;
}
.rec-date { font-size:11px; color:var(--text-muted); min-width:68px; }
.rec-char { font-size:12px; color:var(--text-secondary); flex:1; }
.rec-val  { font-size:13px; font-weight:600; font-family:var(--font-heading); }
.rec-val.up   { color:var(--color-cyan); }
.rec-val.down { color:#ef4444; }
.rec-del {
    background:none; border:none; color:var(--text-muted);
    cursor:pointer; font-size:13px; padding:4px;
}

/* ===== NOTE TAB ===== */
.note-add-area {
    padding:12px; border-bottom:1px solid var(--border-color);
}
.note-list { padding:8px 12px; display:flex; flex-direction:column; gap:8px; }
.note-card {
    background:#111827; border:1px solid rgba(255,255,255,0.07);
    border-radius:10px; padding:12px; position:relative;
}
.note-text {
    font-size:13px; color:var(--text-primary); line-height:1.6;
    padding-right:36px; user-select:text;
}
.note-meta {
    font-size:11px; color:var(--text-muted);
    margin-top:6px; display:flex; gap:8px; align-items:center; flex-wrap:wrap;
}
.note-del {
    position:absolute; top:10px; right:10px;
    background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.25);
    color:#ef4444; border-radius:6px; padding:4px 8px;
    font-size:11px; cursor:pointer;
}
.tag-toggle-row { display:flex; gap:6px; flex-wrap:wrap; margin:6px 0; }
.tag-toggle {
    padding:6px 10px; border-radius:6px;
    font-size:11px; cursor:pointer; border:1px solid;
    background:rgba(0,0,0,0.2); font-family:var(--font-body);
}
.tag-toggle.t-issue    { color:#f87171; border-color:rgba(248,113,113,.3); }
.tag-toggle.t-notice   { color:#fbbf24; border-color:rgba(251,191,36,.3); }
.tag-toggle.t-counter  { color:#60a5fa; border-color:rgba(96,165,250,.3); }
.tag-toggle.t-goal     { color:#4ade80; border-color:rgba(74,222,128,.3); }
.tag-toggle.selected   { box-shadow:0 0 0 1.5px currentColor; background:rgba(255,255,255,0.07); }
.note-add-btn {
    width:100%; margin-top:8px; padding:12px;
    border-radius:8px;
    background:rgba(0,240,255,0.08); border:1px solid rgba(0,240,255,0.25);
    color:var(--color-cyan); font-size:13px; cursor:pointer;
    font-family:var(--font-body);
}

/* ===== ANALYSIS TAB ===== */
.analysis-wrap { padding:12px; display:flex; flex-direction:column; gap:12px; }
.a-section-title {
    font-size:12px; color:var(--text-secondary); font-weight:600;
    display:flex; align-items:center; gap:6px;
}
.a-section-title i { color:var(--color-orange); }
.summary-row { display:flex; gap:8px; }
.stat-box {
    flex:1; background:#111827;
    border:1px solid rgba(255,255,255,0.07);
    border-radius:10px; padding:10px 8px; text-align:center;
}
.stat-val { font-size:18px; font-weight:700; font-family:var(--font-heading); }

.chart-wrap {

}
.chart-tabs { display:flex; gap:6px; margin-bottom:8px; }
.chart-tab {

.chart-tab.active {

.chart-inner { height:200px; position:relative; }

/* ===== TOAST ===== */
.toast {
    position:fixed;
    bottom:calc(var(--nav-h) + var(--safe-bottom) + 14px);
    left:50%; transform:translateX(-50%);
    background:#1f2937; color:var(--text-primary);
    border-left:3px solid var(--color-orange);
    border-radius:8px; padding:10px 16px;
    font-size:13px; z-index:9999;
    white-space:nowrap; max-width:90vw;
    box-shadow:0 4px 20px rgba(0,0,0,0.5);
    animation:toastIn 0.3s ease;
}
@keyframes toastIn {
    from { transform:translateX(-50%) translateY(16px); opacity:0; }
    to   { transform:translateX(-50%) translateY(0); opacity:1; }
}

/* ===== ROOM MODAL ===== */

}
.room-box {

}
.room-box h2 {

.room-input {

                <button class="bs-tag-btn t-drev" data-tag="D-Rev" onclick="toggleBsTag(this)">D-Rev</button>
            </div>
        </div>

        <!-- OD ゲージ -->
        <div>
            <div class="bs-label">ODゲージ消費</div>
            <select id="bs-od" class="bs-input" style="width:auto;min-width:130px;">
                <option value="0">なし</option>
                <option value="1">1ゲージ</option>
                <option value="2">2ゲージ</option>
                <option value="3">3ゲージ</option>
                <option value="4">4ゲージ</option>
                <option value="5">5ゲージ</option>
                <option value="6">6ゲージ</option>
            </select>
        </div>

        <!-- コマンドビルダー -->
        <div>
            <div class="bs-label">コマンド <span style="color:#ef4444;">*</span></div>
            <div class="cmd-builder">
                <div style="display:flex;gap:10px;align-items:flex-start;">
                    <!-- 方向パッド -->
                    <div>
                        <div class="cmd-section-lbl">方向</div>
                        <div class="dir-grid">
                            <button class="dir-btn" id="bsdir-↖" onclick="bsSelDir('↖')">↖</button>
                            <button class="dir-btn" id="bsdir-↑" onclick="bsSelDir('↑')">↑</button>
                            <button class="dir-btn" id="bsdir-↗" onclick="bsSelDir('↗')">↗</button>
                            <button class="dir-btn" id="bsdir-←" onclick="bsSelDir('←')">←</button>
                            <button class="dir-btn" id="bsdir-N" onclick="bsSelDir('')">N</button>
                            <button class="dir-btn" id="bsdir-→" onclick="bsSelDir('→')">→</button>
                            <button class="dir-btn" id="bsdir-↙" onclick="bsSelDir('↙')">↙</button>
                            <button class="dir-btn" id="bsdir-↓" onclick="bsSelDir('↓')">↓</button>
                            <button class="dir-btn" id="bsdir-↘" onclick="bsSelDir('↘')">↘</button>
                        </div>
                    </div>
                    <!-- 技ボタン -->
                    <div style="flex:1;">
                        <div class="cmd-section-lbl" style="color:#00d4ff;">P 系</div>
                        <div class="tech-group" style="margin-bottom:6px;">
                            <button class="tech-btn p-type" onclick="bsAddTech('弱P')">弱P</button>
                            <button class="tech-btn p-type" onclick="bsAddTech('中P')">中P</button>
                            <button class="tech-btn p-type" onclick="bsAddTech('強P')">強P</button>
                            <button class="tech-btn p-type" onclick="bsAddTech('PP')">PP</button>
                        </div>
                        <div class="cmd-section-lbl" style="color:#7ee8a2;">K 系</div>
                        <div class="tech-group" style="margin-bottom:6px;">
                            <button class="tech-btn k-type" onclick="bsAddTech('弱K')">弱K</button>
                            <button class="tech-btn k-type" onclick="bsAddTech('中K')">中K</button>
                            <button class="tech-btn k-type" onclick="bsAddTech('強K')">強K</button>
                            <button class="tech-btn k-type" onclick="bsAddTech('KK')">KK</button>
                        </div>
                        <div class="tech-group">
                            <button class="tech-btn util" onclick="bsAddRaw('OD')">OD</button>
                            <button class="tech-btn util" onclick="bsAddRaw('DR')">DR</button>
                            <button class="tech-btn util" onclick="bsAddRaw('SA1')">SA1</button>
                            <button class="tech-btn util" onclick="bsAddRaw('SA2')">SA2</button>
                            <button class="tech-btn util" onclick="bsAddRaw('SA3')">SA3</button>
                            <button class="tech-btn danger" onclick="bsUndo()">⌫</button>
                        </div>
                    </div>
                </div>
                <!-- プレビュー -->
                <div style="margin-top:8px;">
                    <div class="cmd-section-lbl">プレビュー</div>
                    <div class="cmd-preview-box" id="bs-preview">（コマンドを入力してください）</div>
                    <div style="display:flex;gap:6px;margin-top:6px;">
                        <input type="text" id="bs-cmd-direct" class="bs-input"
                            placeholder="直接入力も可..." style="flex:1;font-family:monospace;font-size:12px;"
                            oninput="bsDirectInput(this.value)">
                        <button onclick="bsClearCmd()" style="padding:8px 12px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#ef4444;border-radius:8px;cursor:pointer;font-size:12px;white-space:nowrap;">全消</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ダメージ / フレーム / メモ -->
        <div class="bs-row">
            <div style="flex:1;">
                <div class="bs-label">ダメージ</div>
                <input type="text" id="bs-damage" class="bs-input" inputmode="numeric" placeholder="3500">
            </div>
            <div style="flex:1;">
                <div class="bs-label">後フレーム</div>
                <input type="text" id="bs-frames" class="bs-input" placeholder="+2">
            </div>
        </div>
        <div>
            <div class="bs-label">メモ</div>
            <input type="text" id="bs-memo" class="bs-input" placeholder="端限定・難度高 etc.">
        </div>

        <button class="bs-save-btn" onclick="saveComboBs()">✓ 保存</button>
    </div>
</div>

<script>
// =====================================================================
// STATE
// =====================================================================
let currentRoom = '';
let records     = [];
let combos      = [];
let notes       = [];
let charLPMemory = {};

let currentRecordMode = 'LR';
let mLpStr = '';
let mCmWin = 0, mCmLose = 0;

let mLpChart  = null;
let mCmChart  = null;
let mLpRange  = 'all';
let mCmView   = 'winrate';

let _swipedCard = null;

// BS state
let bsDir       = null;
let bsCmdTokens = [];

// =====================================================================
// CONSTANTS
// =====================================================================
const RANK_LABELS = {
    rookie:'Rookie', iron:'Iron', bronze:'Bronze', silver:'Silver',
    gold:'Gold', platinum:'Platinum', diamond:'Diamond', master:'Master'
};
const LP_RANK_THRESHOLDS = [
    {rank:'rookie',min:0,max:999},{rank:'iron',min:1000,max:2998},
    {rank:'bronze',min:3000,max:4998},{rank:'silver',min:5000,max:8998},
    {rank:'gold',min:9000,max:12998},{rank:'platinum',min:13000,max:18998},
    {rank:'diamond',min:19000,max:24999},{rank:'master',min:25000,max:Infinity}
];
function getRankFromLP(lp) {
    const f = LP_RANK_THRESHOLDS.find(r => lp >= r.min && lp <= r.max);
    return f ? f.rank : null;
}
const COMBO_TAG_STYLE = {
    'カウンター':'counter','パニッシュカウンター':'pc',
    '画面端':'corner','通常時':'normal','D-Rev':'drev'
};
const MEMO_TAG_STYLE = {
    '課題':'t-issue','気づき':'t-notice','対策':'t-counter','目標':'t-goal'
};

// =====================================================================
// API
// =====================================================================
async function loadAll() {
    try {
        [records, charLPMemory, combos, notes] = await Promise.all([
            fetch(`/api/${currentRoom}/records`).then(r=>r.json()).catch(()=>[]),
            fetch(`/api/${currentRoom}/char_lp_memory`).then(r=>r.json()).catch(()=>({})),
            fetch(`/api/${currentRoom}/combos`).then(r=>r.json()).catch(()=>[]),
            fetch(`/api/${currentRoom}/notes`).then(r=>r.json()).catch(()=>[])
        ]);
    } catch(e){ console.error(e); }
}
async function apiPut(path, data) {
    await fetch(`/api/${currentRoom}/${path}`, {
        method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)
    }).catch(console.error);
}
const saveRecords  = () => apiPut('records', records);
const saveCombos   = () => apiPut('combos', combos);
const saveNotes    = () => apiPut('notes', notes);
const saveCharMem  = () => apiPut('char_lp_memory', charLPMemory);

// =====================================================================
// NAVIGATION
// =====================================================================
let currentTab = 'combo';

function switchTab(tab) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-'  + tab).classList.add('active');
    document.getElementById('nav-'  + tab).classList.add('active');
    document.getElementById('m-fab').classList.toggle('hidden', tab !== 'combo');
    currentTab = tab;
    if (tab === 'record')   renderRecordList();
    if (tab === 'note')     renderNotes();
    if (tab === 'analysis') renderAnalysis();
}

// =====================================================================
// COMBO CARDS
// =====================================================================
function renderComboCards() {
    const char = document.getElementById('m-ct-char').value;
    const list = document.getElementById('combo-cards-list');

    if (!char) {
        list.innerHTML = '<div class="empty-state">上のセレクトからキャラを選択してください</div>';
        return;
    }
    const filtered = combos.filter(c => c.char === char);
    if (filtered.length === 0) {
        list.innerHTML = `<div class="empty-state">${char} のコンボが登録されていません</div>`;
        return;
    }

    list.innerHTML = '';
    filtered.forEach(c => {
        const idx = combos.indexOf(c);
        const wrap = document.createElement('div');
        wrap.className = 'combo-card-wrap';
        wrap.dataset.idx = idx;

        const tagsHtml = (c.tags||[]).map(t =>
            `<span class="tag-badge ${COMBO_TAG_STYLE[t]||''}">${t==='パニッシュカウンター'?'PC':t}</span>`
        ).join('');
        const od = parseInt(c.odGauge||0);
        const odHtml = od > 0 ? `<span class="od-badge">OD×${od}</span>` : '';
        const fv = c.frames || '';
        const fcol = fv.startsWith('+') ? 'var(--color-cyan)' : fv.startsWith('-') ? '#ef4444' : 'var(--text-secondary)';
        const cmd = c.command || '';
        const isLong = cmd.length > 38;

        wrap.innerHTML = `
            <div class="combo-card-inner">
                <div class="combo-cmd${isLong?' short':''}" id="m-cmd-${idx}">${escHtml(cmd)}</div>
                ${isLong ? `<button class="cmd-expand-btn" id="m-exp-${idx}" onclick="toggleCmdExpand(${idx})">全文表示 ▼</button>` : ''}
                <div class="combo-meta-row">
                    ${tagsHtml}${odHtml}
                    ${c.damage ? `<span class="meta-stat">DMG <span>${c.damage}</span></span>` : ''}
                    ${fv ? `<span class="meta-stat">F <span style="color:${fcol}">${fv}</span></span>` : ''}
                </div>
                ${c.memo ? `<div class="combo-memo-text">${escHtml(c.memo)}</div>` : ''}
            </div>
            <div class="swipe-actions">
                <button class="swipe-action-btn sa-edit" onclick="editComboBs(${idx})">
                    <i class="fas fa-pen"></i><span>編集</span>
                </button>
                <button class="swipe-action-btn sa-del" onclick="deleteComboM(${idx})">
                    <i class="fas fa-trash"></i><span>削除</span>
                </button>
            </div>`;

        // Touch swipe
        let sx = 0;
        const inner = wrap.querySelector('.combo-card-inner');
        inner.addEventListener('touchstart', e => {
            sx = e.touches[0].clientX;
            if (_swipedCard && _swipedCard !== wrap) unswipe();
        }, {passive:true});
        inner.addEventListener('touchend', e => {
            const dx = e.changedTouches[0].clientX - sx;
            if (dx < -40)  { wrap.classList.add('swiped'); _swipedCard = wrap; }
            else if (dx > 20) unswipe();
        }, {passive:true});

        list.appendChild(wrap);
    });
}

function unswipe() {
    if (_swipedCard) { _swipedCard.classList.remove('swiped'); _swipedCard = null; }
}

function toggleCmdExpand(idx) {
    const el  = document.getElementById('m-cmd-' + idx);
    const btn = document.getElementById('m-exp-' + idx);
    if (!el) return;
    const collapsed = el.classList.contains('short');
    el.classList.toggle('short', !collapsed);
    if (btn) btn.textContent = collapsed ? '折りたたむ ▲' : '全文表示 ▼';
}

function deleteComboM(idx) {
    unswipe();
    if (!confirm('このコンボを削除しますか？')) return;
    combos.splice(idx, 1);
    saveCombos();
    renderComboCards();
    showToast('🗑️ コンボを削除しました');
}

// =====================================================================
// BOTTOM SHEET (コンボ追加/編集)
// =====================================================================
function openBS(editIdx) {
    const selChar = document.getElementById('m-ct-char').value;

    // Reset
    bsCmdTokens = [];
    bsDir = null;
    clearBsDirActive();
    document.getElementById('bs-edit-idx').value = editIdx !== null && editIdx !== undefined ? editIdx : '';
    document.getElementById('bs-char').value  = '';
    document.getElementById('bs-damage').value = '';
    document.getElementById('bs-frames').value = '';
    document.getElementById('bs-memo').value   = '';
    document.getElementById('bs-od').value     = '0';
    document.getElementById('bs-cmd-direct').value = '';
    document.getElementById('bs-preview').textContent = '（コマンドを入力してください）';
    document.querySelectorAll('#bs-tag-row .bs-tag-btn').forEach(b => b.classList.remove('selected'));

    if (editIdx !== null && editIdx !== undefined && combos[editIdx]) {
        const c = combos[editIdx];
        document.getElementById('bs-title').textContent = 'コンボ編集';
        document.getElementById('bs-char').value    = c.char || '';
        document.getElementById('bs-damage').value  = c.damage || '';
        document.getElementById('bs-frames').value  = c.frames || '';
        document.getElementById('bs-memo').value    = c.memo || '';
        document.getElementById('bs-od').value      = String(c.odGauge || 0);
        document.getElementById('bs-cmd-direct').value = c.command || '';
        document.getElementById('bs-preview').textContent = c.command || '（コマンドを入力してください）';
        bsCmdTokens = c.command ? [c.command] : [];
        (c.tags||[]).forEach(t => {
            const btn = [...document.querySelectorAll('#bs-tag-row .bs-tag-btn')].find(b => b.dataset.tag === t);
            if (btn) btn.classList.add('selected');
        });
    } else {
        document.getElementById('bs-title').textContent = 'コンボ追加';
        if (selChar) document.getElementById('bs-char').value = selChar;
    }

    document.getElementById('bs-overlay').classList.add('show');
    document.getElementById('bottom-sheet').classList.add('open');
}

function closeBS() {
    document.getElementById('bs-overlay').classList.remove('show');
    document.getElementById('bottom-sheet').classList.remove('open');
}

function editComboBs(idx) { unswipe(); openBS(idx); }

function saveComboBs() {
    const char = document.getElementById('bs-char').value;
    if (!char) { showToast('⚠️ キャラを選択してください', '#ef4444'); return; }

    const directVal = document.getElementById('bs-cmd-direct').value.trim();
    const command = directVal || bsCmdTokens.join(' > ');
    if (!command) { showToast('⚠️ コマンドを入力してください', '#ef4444'); return; }

    const tags    = [...document.querySelectorAll('#bs-tag-row .bs-tag-btn.selected')].map(b => b.dataset.tag);
    const damage  = document.getElementById('bs-damage').value.trim();
    const frames  = document.getElementById('bs-frames').value.trim();
    const memo    = document.getElementById('bs-memo').value.trim();
    const odGauge = parseInt(document.getElementById('bs-od').value) || 0;

    const eidxVal = document.getElementById('bs-edit-idx').value;
    if (eidxVal !== '') {
        const idx = parseInt(eidxVal);
        if (combos[idx]) {
            combos[idx] = {...combos[idx], char, command, damage, frames, memo, tags, odGauge};
            saveCombos(); closeBS(); renderComboCards();
            showToast('✅ コンボを更新しました！');
            return;
        }
    }
    combos.push({id:Date.now(), char, command, damage, frames, memo, tags, odGauge});
    saveCombos(); closeBS();
    document.getElementById('m-ct-char').value = char;
    renderComboCards();
    showToast('✅ コンボを登録しました！');
}

// =====================================================================
// COMMAND BUILDER
// =====================================================================
const BS_DIRS = ['↖','↑','↗','←','','→','↙','↓','↘'];

function clearBsDirActive() {
    BS_DIRS.forEach(d => {
        const id  = d === '' ? 'bsdir-N' : 'bsdir-' + d;
        const btn = document.getElementById(id);
        if (btn) { btn.classList.remove('active'); if (d === '↓') btn.textContent = '↓'; }
    });
    bsDir = null;
}

function bsSelDir(dir) {
    // ↓↓ 対応
    if (dir === '↓' && bsDir === '↓') {
        bsDir = '↓↓';
        const btn = document.getElementById('bsdir-↓');
        if (btn) btn.textContent = '↓↓';
        return;
    }
    if (bsDir === '↓↓') {
        const btn = document.getElementById('bsdir-↓');
        if (btn) btn.textContent = '↓';
    }
    clearBsDirActive();
    bsDir = dir;
    const activeBtn = document.getElementById(dir === '' ? 'bsdir-N' : 'bsdir-' + dir);
    if (activeBtn) activeBtn.classList.add('active');
}

function bsAddTech(tech) {
    const prefix = bsDir !== null ? bsDir : '';
    bsCmdTokens.push(prefix + tech);
    bsDir = null;
    clearBsDirActive();
    bsUpdatePreview();
}

function bsAddRaw(text) {
    bsCmdTokens.push(text);
    bsDir = null;
    clearBsDirActive();
    bsUpdatePreview();
}

function bsUndo() {
    if (bsCmdTokens.length) bsCmdTokens.pop();
    bsDir = null;
    clearBsDirActive();
    bsUpdatePreview();
}

function bsClearCmd() {
    bsCmdTokens = [];
    bsDir = null;
    clearBsDirActive();
    document.getElementById('bs-cmd-direct').value = '';
    document.getElementById('bs-preview').textContent = '（コマンドを入力してください）';
}

function bsUpdatePreview() {
    const cmd = bsCmdTokens.join(' > ');
    document.getElementById('bs-preview').textContent = cmd || '（コマンドを入力してください）';
    document.getElementById('bs-cmd-direct').value = cmd;
}

function bsDirectInput(val) {
    bsCmdTokens = val ? [val] : [];
    document.getElementById('bs-preview').textContent = val || '（コマンドを入力してください）';
}

function toggleBsTag(btn) { btn.classList.toggle('selected'); }

// =====================================================================
// RECORD TAB
// =====================================================================
function setRecordMode(mode) {
    currentRecordMode = mode;
    ['lr','mr','cm'].forEach(m => {
        document.getElementById('rtab-' + m).classList.toggle('active', m === mode.toLowerCase());
    });
    const isCM = mode === 'CM';
    document.getElementById('record-lp-form').style.display = isCM ? 'none' : '';
    document.getElementById('record-cm-form').style.display = isCM ? '' : 'none';
    if (!isCM) {
        document.getElementById('m-lp-label').textContent = mode === 'MR' ? '現在のMR' : '現在のLP';
        const rankGrp = document.getElementById('rank-group');
        if (rankGrp) rankGrp.style.display = mode === 'MR' ? 'none' : '';
        if (mode === 'MR') document.getElementById('m-input-rank').value = 'master';
    }
}

function mLpKey(k) {
    if (k === 'C')  mLpStr = '';
    else if (k === '⌫') mLpStr = mLpStr.slice(0,-1);
    else { mLpStr = (mLpStr === '0' || mLpStr === '') ? k : mLpStr + k; }
    const num = parseInt(mLpStr) || 0;
    document.getElementById('m-lp-display').textContent = mLpStr ? num.toLocaleString() : '';
    if (currentRecordMode === 'LR' && mLpStr) {
        const rank = getRankFromLP(num);
        if (rank) document.getElementById('m-input-rank').value = rank;
    }
    const char = document.getElementById('m-input-char').value;
    const diffEl = document.getElementById('m-lp-diff');
    if (char && mLpStr && charLPMemory[char] != null) {
        const diff = num - charLPMemory[char];
        const sign = diff >= 0 ? '+' : '';
        diffEl.textContent = `前回比: ${sign}${diff.toLocaleString()} LP`;
        diffEl.style.color = diff > 0 ? 'var(--color-cyan)' : diff < 0 ? '#ef4444' : 'var(--text-muted)';
    } else { diffEl.textContent = ''; }
}

function mOnCharChange() {
    const char = document.getElementById('m-input-char').value;
    if (!char || currentRecordMode === 'CM') return;
    const mem = charLPMemory[char];
    if (mem != null && currentRecordMode !== 'MR') {
        mLpStr = String(mem);
        document.getElementById('m-lp-display').textContent = mem.toLocaleString();
        const rank = getRankFromLP(mem);
        if (rank) document.getElementById('m-input-rank').value = rank;
    }
}

function mCMAdj(type, delta) {
    if (type === 'win') {
        mCmWin = Math.max(0, mCmWin + delta);
        document.getElementById('m-cm-win-disp').textContent = mCmWin;
    } else {
        mCmLose = Math.max(0, mCmLose + delta);
        document.getElementById('m-cm-lose-disp').textContent = mCmLose;
    }
}

function saveRecordM() {
    const isCM = currentRecordMode === 'CM';
    const date  = document.getElementById(isCM ? 'm-input-date-cm' : 'm-input-date').value;
    const char  = document.getElementById(isCM ? 'm-input-char-cm' : 'm-input-char').value;
    if (!date || !char) { showToast('⚠️ 日付・キャラは必須です', '#ef4444'); return; }

    if (isCM) {
        if (mCmWin === 0 && mCmLose === 0) { showToast('⚠️ 勝敗数を入力してください', '#ef4444'); return; }
        const opponent = document.getElementById('m-input-opponent').value || null;
        const memo     = document.getElementById('m-memo-cm').value.trim();
        let id = Date.now();
        for (let i = 0; i < mCmWin;  i++) records.push({id:id++,date,char,rank:'custom',lp:null,diff:0,memo,mode:'CM',result:'WIN', opponent});
        for (let i = 0; i < mCmLose; i++) records.push({id:id++,date,char,rank:'custom',lp:null,diff:0,memo,mode:'CM',result:'LOSE',opponent});
        const w = mCmWin; const l = mCmLose;
        mCmWin = 0; mCmLose = 0;
        document.getElementById('m-cm-win-disp').textContent  = '0';
        document.getElementById('m-cm-lose-disp').textContent = '0';
        document.getElementById('m-memo-cm').value = '';
        showToast(`✅ CM ${w}勝${l}敗 を保存しました！`);
    } else {
        const lp = parseInt(mLpStr);
        if (isNaN(lp)) { showToast('⚠️ LPを入力してください', '#ef4444'); return; }
        const finalRank = currentRecordMode === 'MR' ? 'master' : (document.getElementById('m-input-rank').value || getRankFromLP(lp) || 'rookie');
        const last = charLPMemory[char] ?? null;
        const diff = last !== null ? lp - last : 0;
        records.push({id:Date.now(),date,char,rank:finalRank,lp,diff,memo:document.getElementById('m-memo-lp').value.trim(),mode:currentRecordMode,result:null,opponent:null});
        charLPMemory[char] = lp;
        saveCharMem();
        mLpStr = '';
        document.getElementById('m-lp-display').textContent = '';
        document.getElementById('m-lp-diff').textContent    = '';
        document.getElementById('m-memo-lp').value = '';
        showToast('✅ 記録を保存しました！');
    }
    saveRecords();
    renderRecordList();
}

function renderRecordList() {
    const list    = document.getElementById('m-record-list');
    const countEl = document.getElementById('m-rec-count');
    const recent  = [...records].reverse().slice(0, 30);
    countEl.textContent = `全${records.length}件`;
    if (recent.length === 0) { list.innerHTML = '<div class="empty-state">記録がありません</div>'; return; }
    list.innerHTML = recent.map(r => {
        let valHtml;
        if (r.mode === 'CM') {
            const cls = r.result === 'WIN' ? 'up' : 'down';
            valHtml = `<span class="rec-val ${cls}">${r.result==='WIN'?'勝':'負'}</span>`;
        } else {
            const sign = r.diff > 0 ? '+' : '';
            const cls  = r.diff > 0 ? 'up' : r.diff < 0 ? 'down' : '';
            valHtml = `<span class="rec-val ${cls}">${(r.lp||0).toLocaleString()}<small style="font-size:10px;opacity:.7;"> ${sign}${r.diff}</small></span>`;
        }
        const modeBadge = r.mode !== 'LR' ? ` <small style="color:var(--text-muted);">[${r.mode}]</small>` : '';
        return `<div class="record-row">
            <span class="rec-date">${r.date}</span>
            <span class="rec-char">${escHtml(r.char)}${modeBadge}</span>
            ${valHtml}
            <button class="rec-del" onclick="deleteRecordM(${r.id})"><i class="fas fa-times"></i></button>
        </div>`;
    }).join('');
}

function deleteRecordM(id) {
    if (!confirm('この記録を削除しますか？')) return;
    records = records.filter(r => r.id !== id);
    recalcDiffs(); saveRecords(); renderRecordList();
    showToast('🗑️ 記録を削除しました');
}

function recalcDiffs() {
    for (let i = 0; i < records.length; i++) {
        if (records[i].mode === 'CM') { records[i].diff = 0; continue; }
        let prev = null;
        for (let j = i-1; j >= 0; j--) { if (records[j].lp != null) { prev = records[j].lp; break; } }
        records[i].diff = prev !== null ? records[i].lp - prev : 0;
    }
}

// =====================================================================
// NOTE TAB
// =====================================================================
function toggleNoteTag(btn) { btn.classList.toggle('selected'); }

function addNoteM() {
    const text = document.getElementById('m-note-text').value.trim();
    if (!text) { showToast('⚠️ 本文を入力してください', '#ef4444'); return; }
    const tags = [...document.querySelectorAll('#note-tag-row .tag-toggle.selected')].map(b => b.dataset.tag);
    const char = document.getElementById('m-note-char').value;
    notes.unshift({id:Date.now(), text, tags, char, date:new Date().toISOString().split('T')[0], createdAt:new Date().toISOString()});
    saveNotes();
    document.getElementById('m-note-text').value = '';
    document.querySelectorAll('#note-tag-row .tag-toggle').forEach(b => b.classList.remove('selected'));
    renderNotes();
    showToast('✅ メモを保存しました！');
}

function renderNotes() {
    const list = document.getElementById('m-note-list');
    if (notes.length === 0) { list.innerHTML = '<div class="empty-state">メモがありません</div>'; return; }
    list.innerHTML = notes.map(n => {
        const tagsHtml = (n.tags||[]).map(t => `<span class="tag-badge ${MEMO_TAG_STYLE[t]||''}">${t}</span>`).join('');
        return `<div class="note-card">
            <div class="note-text">${escHtml(n.text).replace(/\n/g,'<br>')}</div>
            <div class="note-meta">
                <span>${n.date}</span>
                ${n.char ? `<span>📌 ${escHtml(n.char)}</span>` : ''}
                ${tagsHtml}
            </div>
            <button class="note-del" onclick="deleteNoteM(${n.id})">✕</button>
        </div>`;
    }).join('');
}

function deleteNoteM(id) {
    if (!confirm('このメモを削除しますか？')) return;
    notes = notes.filter(n => n.id !== id);
    saveNotes(); renderNotes();
    showToast('🗑️ メモを削除しました');
}

// =====================================================================
// ANALYSIS TAB
// =====================================================================
function renderAnalysis() {
    // LP stats
    const lpRecs = records.filter(r => r.lp != null).sort((a,b) => a.date.localeCompare(b.date));
    const last   = lpRecs[lpRecs.length-1];
    const prev   = lpRecs[lpRecs.length-2];
    document.getElementById('m-stat-lp').textContent  = last ? last.lp.toLocaleString() : '—';
    document.getElementById('m-stat-cnt').textContent = records.length;
    const diffEl = document.getElementById('m-stat-diff');
    if (last && prev) {
        const d = last.lp - prev.lp;
        const s = d >= 0 ? '+' : '';
        diffEl.textContent  = `${s}${d.toLocaleString()}`;
        diffEl.style.color  = d > 0 ? 'var(--color-cyan)' : d < 0 ? '#ef4444' : 'var(--text-muted)';
        diffEl.style.fontSize = '14px';
    }
    // CM stats
    const cmR = records.filter(r => r.mode === 'CM' && r.result);
    const w   = cmR.filter(r => r.result === 'WIN').length;
    const l   = cmR.filter(r => r.result === 'LOSE').length;
    const t   = w + l;
    document.getElementById('m-cm-w').textContent    = w;
    document.getElementById('m-cm-l').textContent    = l;
    document.getElementById('m-cm-rate').textContent = t > 0 ? Math.round((w/t)*100)+'%' : '—';
    renderMLPChart();
    renderMCMChart();
}

function setMLPRange(range, btn) {
    mLpRange = range;
    document.querySelectorAll('.chart-tab:not(#m-cm-chart-tabs .chart-tab)').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderMLPChart();
}

function setMCMView(view, btn) {
    mCmView = view;
    document.querySelectorAll('#m-cm-chart-tabs .chart-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderMCMChart();
}

const CHART_COLORS = ['#00f0ff','#f0b400','#a78bfa','#10b981','#f43f5e','#fb923c','#34d399','#60a5fa'];

function renderMLPChart() {
    if (mLpChart) { mLpChart.destroy(); mLpChart = null; }
    let data = [...records].filter(r => r.lp != null).sort((a,b) => a.date.localeCompare(b.date));
    if (mLpRange !== 'all') {
        const cut = new Date(); cut.setDate(cut.getDate() - parseInt(mLpRange));
        const cStr = cut.toISOString().split('T')[0];
        data = data.filter(r => r.date >= cStr);
    }
    if (data.length === 0) return;
    const charMap = {};
    data.forEach(r => { const ch = r.char||'不明'; if (!charMap[ch]) charMap[ch]={}; charMap[ch][r.date]=r.lp; });
    const charList = Object.keys(charMap);
    const allDates = [...new Set(data.map(r=>r.date))].sort();
    const datasets  = charList.map((ch,i) => ({
        label:ch, data:allDates.map(d=>charMap[ch][d]??null),
        borderColor:CHART_COLORS[i%CHART_COLORS.length],
        backgroundColor:charList.length===1?'rgba(0,240,255,0.06)':'transparent',
        pointBackgroundColor:CHART_COLORS[i%CHART_COLORS.length],
        pointRadius:3, borderWidth:2,
        fill:charList.length===1, tension:0.4, spanGaps:true
    }));
    const ctx = document.getElementById('m-lp-chart').getContext('2d');
    mLpChart = new Chart(ctx, {
        type:'line', data:{labels:allDates, datasets},
        options:{
            responsive:true, maintainAspectRatio:false,
            plugins:{
                legend:{display:charList.length>1,labels:{color:'#9aa0b0',font:{size:10},boxWidth:10}},
                tooltip:{backgroundColor:'#1f2937',titleColor:'#9aa0b0',bodyColor:'#f0f2f7',borderColor:'rgba(255,255,255,0.1)',borderWidth:1}
            },
            scales:{
                x:{ticks:{color:'#626875',font:{size:9},maxTicksLimit:7},grid:{color:'rgba(255,255,255,0.04)'}},
                y:{ticks:{color:'#626875',font:{size:9}},grid:{color:'rgba(255,255,255,0.04)'}}
            }
        }
    });
}

function renderMCMChart() {
    if (mCmChart) { mCmChart.destroy(); mCmChart = null; }
    const cmR = records.filter(r => r.mode === 'CM' && r.result);
    if (cmR.length === 0) return;
    const ctx = document.getElementById('m-cm-chart').getContext('2d');

    const commonDatasets = (keys, byKey) => [
        {label:'勝ち', data:keys.map(k=>byKey[k].win),  backgroundColor:'rgba(0,240,255,0.7)', borderColor:'#00f0ff', borderWidth:1, borderRadius:3, stack:'s'},
        {label:'負け', data:keys.map(k=>byKey[k].lose), backgroundColor:'rgba(239,68,68,0.6)', borderColor:'#ef4444', borderWidth:1, borderRadius:3, stack:'s'}
    ];
    const commonOpts = (indexAxis='x') => ({
        indexAxis, responsive:true, maintainAspectRatio:false,
        plugins:{legend:{display:true,labels:{color:'#9aa0b0',font:{size:10},boxWidth:10}}},
        scales:{
            x:{stacked:true,ticks:{color:'#626875',font:{size:9},maxTicksLimit:8},grid:{color:'rgba(255,255,255,0.04)'}},
            y:{stacked:true,beginAtZero:true,ticks:{color:indexAxis==='y'?'#f0f2f7':'#626875',font:{size:9}},grid:{color:'rgba(255,255,255,0.04)'}}
        }
    });

    if (mCmView === 'winrate') {
        const byDate = {};
        cmR.forEach(r => { if (!byDate[r.date]) byDate[r.date]={win:0,lose:0}; r.result==='WIN'?byDate[r.date].win++:byDate[r.date].lose++; });
        const dates = Object.keys(byDate).sort();
        mCmChart = new Chart(ctx, {type:'bar', data:{labels:dates, datasets:commonDatasets(dates,byDate)}, options:commonOpts()});
    } else {
        const key = mCmView === 'opponent' ? 'opponent' : 'char';
        const byKey = {};
        cmR.forEach(r => { const k=r[key]||'不明'; if (!byKey[k]) byKey[k]={win:0,lose:0}; r.result==='WIN'?byKey[k].win++:byKey[k].lose++; });
        const keys = Object.keys(byKey).sort((a,b) => (byKey[b].win+byKey[b].lose)-(byKey[a].win+byKey[a].lose));
        mCmChart = new Chart(ctx, {type:'bar', data:{labels:keys, datasets:commonDatasets(keys,byKey)}, options:commonOpts('y')});
    }
}

// =====================================================================
// UTIL
// =====================================================================
function escHtml(str) {
    return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, color = '#ff6a00') {
    const ex = document.querySelector('.toast');
    if (ex) ex.remove();
    const t = document.createElement('div');
    t.className = 'toast';
    t.style.borderLeftColor = color;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
}

// =====================================================================
// ROOM / INIT
// =====================================================================
function enterRoom() {
    const val = document.getElementById('room-id-input').value.trim();
    const err = document.getElementById('room-id-error');
    if (!val || val.length > 32 || /[:\s\/\\]/.test(val)) {
        err.textContent = 'スペース・コロン・スラッシュは使用不可（1〜32文字）';
        return;
    }
    err.textContent = '';
    currentRoom = val;
    localStorage.setItem('lastRoom', val);
    document.getElementById('room-modal').style.display = 'none';
    document.getElementById('app').style.display        = '';
    document.getElementById('room-badge-name').textContent = val;
    initMobile();
}

function changeRoom() {
    document.getElementById('room-id-input').value = currentRoom;
    document.getElementById('room-id-error').textContent = '';
    document.getElementById('room-modal').style.display = 'flex';
    document.getElementById('app').style.display        = 'none';
}

async function initMobile() {
    await loadAll();
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('m-input-date').value    = today;
    document.getElementById('m-input-date-cm').value = today;

    // Restore last selected char
    const lastChar = localStorage.getItem('lastChar');
    if (lastChar) {
        const sel = document.getElementById('m-ct-char');
        if ([...sel.options].some(o => o.value === lastChar)) {
            sel.value = lastChar;
            renderComboCards();
        }
    }
    renderRecordList();
    renderNotes();
}

// Auto-restore room
(function() {
    const saved = localStorage.getItem('lastRoom');
    if (saved) {
        document.getElementById('room-id-input').value = saved;
        enterRoom();
    }
})();
</script>
