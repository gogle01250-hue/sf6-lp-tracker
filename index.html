<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SF6 LP Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Outfit:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
/* ==========================================================================
   DESIGN TOKENS & SYSTEM VARIABLES
   ========================================================================== */
:root {
    --bg-main: #0b0c10;
    --bg-panel: rgba(22, 26, 35, 0.65);
    --bg-panel-solid: #161a23;
    --border-color: rgba(255, 255, 255, 0.07);
    --border-hover: rgba(255, 255, 255, 0.15);
    
    /* SF6 Theme Colors */
    --color-orange: #ff6a00;
    --color-orange-glow: rgba(255, 106, 0, 0.4);
    --color-cyan: #00f0ff;
    --color-cyan-glow: rgba(0, 240, 255, 0.3);
    --color-yellow: #ffcc00;
    
    /* Text Colors */
    --text-primary: #f0f2f7;
    --text-secondary: #9aa0b0;
    --text-muted: #626875;
    
    /* Rank Specific Colors */
    --rank-rookie: #808080;
    --rank-iron: #a17455;
    --rank-bronze: #cd7f32;
    --rank-silver: #c0c0c0;
    --rank-gold: #ffd700;
    --rank-platinum: #a0b2c6;
    --rank-diamond: #4fc3f7;
    --rank-master: #9c27b0;
    
    /* Grid & Spacing */
    --radius-lg: 16px;
    --radius-md: 10px;
    --radius-sm: 6px;
    --font-heading: 'Orbitron', 'Outfit', 'Noto Sans JP', sans-serif;
    --font-body: 'Outfit', 'Noto Sans JP', sans-serif;
}

/* ==========================================================================
   RESET & BASE STYLES
   ========================================================================== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background-color: var(--bg-main);
    color: var(--text-primary);
    font-family: var(--font-body);
    line-height: 1.6;
    background-image: 
        radial-gradient(circle at 10% 20%, rgba(255, 106, 0, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(0, 240, 255, 0.05) 0%, transparent 45%);
    background-attachment: fixed;
    min-height: 100vh;
    padding: 20px;
}

::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg-main); }
::-webkit-scrollbar-thumb { background: #232a38; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #343f54; }

/* ==========================================================================
   LAYOUT STRUCTURE
   ========================================================================== */
.app-container {
    max-width: 1300px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 24px;
}

.app-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 24px;
    background: var(--bg-panel);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-lg);
    box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
}

.logo-area { display: flex; align-items: center; gap: 16px; }

.logo-icon {
    font-size: 2.2rem;
    background: linear-gradient(135deg, var(--color-orange), var(--color-yellow));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 10px var(--color-orange-glow));
}

.logo-text h1 {
    font-family: var(--font-heading);
    font-size: 1.6rem;
    font-weight: 900;
    letter-spacing: 2px;
    line-height: 1.1;
    background: linear-gradient(90deg, #fff 0%, #dbe1e8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.logo-text p {
    font-size: 0.8rem;
    color: var(--text-secondary);
    font-weight: 400;
    margin-top: 2px;
}

.header-actions { display: flex; gap: 10px; }

/* ==========================================================================
   DASHBOARD / STATS
   ========================================================================== */
.dashboard-summary {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 20px;
}

.stat-card {
    position: relative;
    background: var(--bg-panel);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-lg);
    padding: 24px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    transition: transform 0.3s ease, border-color 0.3s ease;
}

.stat-card:hover {
    transform: translateY(-4px);
    border-color: rgba(255, 106, 0, 0.25);
}

.card-glow {
    position: absolute;
    top: -50px; right: -50px;
    width: 120px; height: 120px;
    background: radial-gradient(circle, var(--color-orange-glow) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
    z-index: 1;
}

.stat-card:nth-child(2) .card-glow {
    background: radial-gradient(circle, var(--color-cyan-glow) 0%, transparent 70%);
}

.card-content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    height: 100%;
}

.card-label {
    font-size: 0.8rem;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
    display: block;
    font-weight: 500;
}

.rank-badge-container { display: flex; align-items: center; gap: 18px; }

.rank-badge-placeholder {
    width: 60px; height: 60px;
    display: flex; justify-content: center; align-items: center;
    border-radius: var(--radius-md);
    background: rgba(255, 255, 255, 0.03);
    border: 1px dashed rgba(255, 255, 255, 0.1);
    font-size: 1.8rem;
}

.rank-info-text h2 {
    font-family: var(--font-heading);
    font-size: 1.4rem;
    font-weight: 700;
    line-height: 1.2;
}

.rank-info-text p {
    font-family: var(--font-heading);
    font-size: 0.95rem;
    color: var(--color-orange);
    font-weight: 600;
    margin-top: 2px;
}

.progress-val-container {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin: 4px 0;
}

.diff-value {
    font-family: var(--font-heading);
    font-size: 2.2rem;
    font-weight: 900;
}

.diff-value.up { color: var(--color-cyan); text-shadow: 0 0 10px var(--color-cyan-glow); }
.diff-value.down { color: #ef4444; text-shadow: 0 0 10px rgba(239, 68, 68, 0.3); }
.diff-value.zero { color: var(--text-muted); }

.diff-unit {
    font-family: var(--font-heading);
    font-size: 0.95rem;
    color: var(--text-secondary);
    font-weight: 700;
}

.card-subtext { font-size: 0.75rem; color: var(--text-muted); margin-top: 6px; }

.milestone-body { display: flex; flex-direction: column; gap: 6px; }

.progress-bar-container {
    width: 100%; height: 10px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: var(--radius-sm);
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.03);
}

.progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--color-orange), var(--color-yellow));
    box-shadow: 0 0 8px var(--color-orange-glow);
    border-radius: var(--radius-sm);
    transition: width 0.5s ease-out;
}

.milestone-details {
    display: flex;
    justify-content: space-between;
    font-family: var(--font-heading);
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text-secondary);
}

/* ==========================================================================
   MAIN LAYOUT & CARDS
   ========================================================================== */
.main-layout {
    display: grid;
    grid-template-columns: 1fr 1.5fr;
    gap: 24px;
}

@media (max-width: 992px) {
    .main-layout { grid-template-columns: 1fr; }
}

.glass-panel {
    background: var(--bg-panel);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-lg);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
    display: flex;
    flex-direction: column;
}

.panel-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border-color);
}

.panel-header h2 {
    font-size: 1.15rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
    letter-spacing: 0.5px;
}

.panel-header h2 i {
    color: var(--color-orange);
    filter: drop-shadow(0 0 5px var(--color-orange-glow));
}

/* ==========================================================================
   INPUT FORM STYLES
   ========================================================================== */
#record-form {
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
}

@media (max-width: 480px) {
    .form-row { grid-template-columns: 1fr; }
}

.form-group { display: flex; flex-direction: column; gap: 8px; }

label {
    font-size: 0.8rem;
    color: var(--text-secondary);
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 6px;
}

label i { color: var(--color-cyan); }

input[type="number"],
input[type="date"],
select,
textarea {
    background: rgba(0, 0, 0, 0.2);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-md);
    padding: 12px 14px;
    color: var(--text-primary);
    font-family: inherit;
    font-size: 0.95rem;
    transition: all 0.2s ease;
    width: 100%;
}

input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--color-orange);
    box-shadow: 0 0 0 3px rgba(255, 106, 0, 0.15);
    background: rgba(0, 0, 0, 0.3);
}

.input-with-helper { position: relative; }

.input-helper-text {
    display: block;
    margin-top: 4px;
    font-size: 0.75rem;
    color: var(--color-cyan);
    font-weight: 500;
    min-height: 18px;
}

.form-toggle-container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(0, 0, 0, 0.15);
    padding: 8px 12px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border-color);
}

.toggle-title {
    font-size: 0.8rem;
    color: var(--text-secondary);
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
}

.toggle-buttons {
    display: flex;
    background: rgba(255, 255, 255, 0.03);
    padding: 2px;
    border-radius: var(--radius-sm);
    border: 1px solid rgba(255,255,255,0.05);
}

.toggle-btn {
    border: none;
    background: transparent;
    color: var(--text-secondary);
    padding: 6px 16px;
    font-size: 0.8rem;
    font-family: var(--font-heading);
    font-weight: 700;
    cursor: pointer;
    border-radius: var(--radius-sm);
    transition: all 0.2s ease;
}

.toggle-btn.active {
    background: var(--color-orange);
    color: #fff;
    box-shadow: 0 0 10px var(--color-orange-glow);
}

.quick-rank-select {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: -6px;
}

.quick-label { font-size: 0.75rem; color: var(--text-muted); }

.btn-quick-lp {
    border: 1px solid var(--border-color);
    background: rgba(255, 255, 255, 0.02);
    color: var(--text-secondary);
    font-size: 0.75rem;
    padding: 4px 8px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.2s;
}

.btn-quick-lp:hover {
    border-color: var(--color-cyan);
    color: var(--color-cyan);
    background: rgba(0, 240, 255, 0.05);
}

.inputs-group {
    display: flex;
    flex-direction: column;
    gap: 16px;
    animation: fadeIn 0.3s ease;
}

.hidden { display: none !important; }

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
}

/* ==========================================================================
   BUTTON STYLES
   ========================================================================== */
.btn {
    border: none;
    font-family: inherit;
    font-weight: 600;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    border-radius: var(--radius-md);
    transition: all 0.2s ease;
}

.btn-primary {
    background: linear-gradient(135deg, var(--color-orange) 0%, #e65c00 100%);
    color: #fff;
    box-shadow: 0 4px 15px var(--color-orange-glow);
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(255, 106, 0, 0.5);
    filter: brightness(1.1);
}

.btn-secondary {
    background: rgba(255, 255, 255, 0.05);
    color: var(--text-primary);
    border: 1px solid var(--border-color);
}

.btn-secondary:hover {
    background: rgba(255, 255, 255, 0.1);
    border-color: var(--border-hover);
}

.btn-sm { padding: 6px 12px; font-size: 0.8rem; border-radius: var(--radius-sm); }
.btn-block { width: 100%; padding: 14px 20px; font-size: 1rem; }
.btn:active { transform: translateY(1px); }

/* ==========================================================================
   CHART SECTION
   ========================================================================== */
.chart-header-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
}

.chart-tabs {
    display: flex;
    gap: 6px;
    background: rgba(0, 0, 0, 0.2);
    padding: 4px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border-color);
}

.tab-btn {
    border: none;
    background: transparent;
    color: var(--text-secondary);
    padding: 6px 12px;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    border-radius: var(--radius-sm);
    transition: all 0.2s;
}

.tab-btn.active {
    background: rgba(255, 255, 255, 0.08);
    color: var(--color-cyan);
    box-shadow: inset 0 0 10px rgba(0, 240, 255, 0.1);
}

.chart-container {
    padding: 24px;
    flex-grow: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    min-height: 340px;
}

canvas { width: 100% !important; height: 100% !important; }

/* ==========================================================================
   HISTORY TABLE SECTION
   ========================================================================== */
.table-header-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
}

.filter-select {
    padding: 8px 12px;
    background: rgba(0,0,0,0.2);
    border-radius: var(--radius-md);
    border: 1px solid var(--border-color);
    font-size: 0.85rem;
    color: var(--text-primary);
}

.table-container {
    padding: 0;
    overflow-x: auto;
    border-radius: 0 0 var(--radius-lg) var(--radius-lg);
}

.history-table {
    width: 100%;
    border-collapse: collapse;
    text-align: left;
    font-size: 0.9rem;
}

.history-table th,
.history-table td {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border-color);
}

.history-table th {
    background: rgba(255, 255, 255, 0.02);
    color: var(--text-secondary);
    font-weight: 600;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.history-table tbody tr { transition: background-color 0.2s; }
.history-table tbody tr:hover { background-color: rgba(255, 255, 255, 0.015); }
.history-table td { color: var(--text-primary); }

.history-table .rank-cell-content { display: flex; align-items: center; gap: 8px; }
.history-table .char-cell { font-weight: 600; }

.history-table .mode-badge {
    font-size: 0.75rem;
    font-family: var(--font-heading);
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 4px;
}

.mode-badge.lr { background: rgba(255, 106, 0, 0.1); color: var(--color-orange); border: 1px solid rgba(255, 106, 0, 0.2); }
.mode-badge.mr { background: rgba(124, 58, 237, 0.1); color: #a78bfa; border: 1px solid rgba(124, 58, 237, 0.2); }
.mode-badge.cm { background: rgba(0, 200, 100, 0.1); color: #4ade80; border: 1px solid rgba(0, 200, 100, 0.2); }

.history-table .diff-cell { font-family: var(--font-heading); font-weight: 700; }
.history-table .diff-cell.plus { color: var(--color-cyan); }
.history-table .diff-cell.minus { color: #ef4444; }

.history-table .memo-cell {
    color: var(--text-secondary);
    max-width: 280px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.history-table .action-cell { display: flex; justify-content: center; gap: 8px; }

.btn-action {
    border: none;
    background: transparent;
    cursor: pointer;
    font-size: 0.95rem;
    padding: 6px;
    border-radius: 4px;
    transition: all 0.2s;
}

.btn-action.edit { color: var(--text-secondary); }
.btn-action.edit:hover { color: var(--color-cyan); background: rgba(0, 240, 255, 0.08); }
.btn-action.delete { color: var(--text-muted); }
.btn-action.delete:hover { color: #ef4444; background: rgba(239, 68, 68, 0.08); }

.empty-state { text-align: center; padding: 48px !important; color: var(--text-muted); font-style: italic; }

/* ==========================================================================
   TOAST NOTIFICATIONS
   ========================================================================== */
.toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: #1f2937;
    color: #fff;
    padding: 14px 24px;
    border-radius: var(--radius-md);
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
    border-left: 4px solid var(--color-orange);
    z-index: 1000;
    font-weight: 500;
    animation: slideIn 0.3s ease, fadeOut 0.3s ease 2.7s forwards;
}

@keyframes slideIn {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
}

@keyframes fadeOut {
    from { opacity: 1; }
    to { opacity: 0; }
}

/* ==========================================================================
   RANK BADGES
   ========================================================================== */
.rank-badge-inline {
    width: 24px; height: 24px;
    display: inline-flex;
    justify-content: center; align-items: center;
    font-weight: bold;
    border-radius: 4px;
    font-size: 0.75rem;
    color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,0.6);
}

.rb-rookie   { background: var(--rank-rookie); }
.rb-iron     { background: var(--rank-iron); }
.rb-bronze   { background: var(--rank-bronze); }
.rb-silver   { background: var(--rank-silver); }
.rb-gold     { background: var(--rank-gold); color: #000; text-shadow: none; }
.rb-platinum { background: var(--rank-platinum); }
.rb-diamond  { background: var(--rank-diamond); }
.rb-master   { background: var(--rank-master); }

/* Edit modal */
.modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 500;
    display: flex; justify-content: center; align-items: center;
}

.modal-box {
    background: var(--bg-panel-solid);
    border: 1px solid var(--border-hover);
    border-radius: var(--radius-lg);
    padding: 32px;
    width: 90%; max-width: 480px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}

.modal-box h3 {
    font-family: var(--font-heading);
    font-size: 1.1rem;
    margin-bottom: 20px;
    color: var(--color-orange);
}

.modal-actions { display: flex; gap: 12px; margin-top: 20px; }
    </style>
</head>
<body>
<div class="app-container">

    <!-- HEADER -->
    <header class="app-header">
        <div class="logo-area">
            <div class="logo-icon">⚡</div>
            <div class="logo-text">
                <h1>SF6 LP TRACKER</h1>
                <p>ランクマッチ成績管理ツール</p>
            </div>
        </div>
        <div class="header-actions">
            <a class="btn btn-secondary btn-sm" href="https://www.streetfighter.com/6/ja-jp" target="_blank" rel="noopener">
                <i class="fas fa-globe"></i> SF6公式サイト
            </a>
            <button class="btn btn-secondary btn-sm" onclick="exportCSV()">
                <i class="fas fa-download"></i> CSV出力
            </button>
            <button class="btn btn-secondary btn-sm" onclick="openDateClearModal()">
                <i class="fas fa-calendar-times"></i> 期間クリア
            </button>
            <button class="btn btn-secondary btn-sm" onclick="clearAllData()">
                <i class="fas fa-trash"></i> リセット
            </button>
        </div>
    </header>

    <!-- DASHBOARD -->
    <section class="dashboard-summary">
        <!-- 現在ランク -->
        <div class="stat-card">
            <div class="card-glow"></div>
            <div class="card-content">
                <span class="card-label"><i class="fas fa-shield-halved"></i> 現在のランク</span>
                <div class="rank-badge-container">
                    <div class="rank-badge-placeholder" id="current-rank-icon">—</div>
                    <div class="rank-info-text">
                        <h2 id="current-rank-name">記録なし</h2>
                        <p id="current-lp-display">— LP</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 本日のLP変動 -->
        <div class="stat-card">
            <div class="card-glow"></div>
            <div class="card-content">
                <span class="card-label"><i class="fas fa-chart-line"></i> 本日のLP変動</span>
                <div class="progress-val-container">
                    <span class="diff-value zero" id="today-diff">0</span>
                    <span class="diff-unit">LP</span>
                </div>
                <div class="card-subtext" id="today-sessions">本日 0 セッション</div>
            </div>
        </div>

        <!-- 総合成績 -->
        <div class="stat-card">
            <div class="card-glow"></div>
            <div class="card-content">

<script>
// ============================================================================
// RANK DATA - ランクデータ定義（新仕様）
// ============================================================================
const RANK_CONFIG = {
    rookie: {
        name: 'Rookie★',
        color: '#808080',
        levels: [
            { level: 1, min: 0, max: 200 },
            { level: 2, min: 200, max: 400 },
            { level: 3, min: 400, max: 600 },
            { level: 4, min: 600, max: 800 },
            { level: 5, min: 800, max: 800 }
        ]
    },
    iron: {
        name: 'Iron★',
        color: '#a17455',
        levels: [
            { level: 1, min: 1000, max: 1400 },
            { level: 2, min: 1400, max: 1800 },
            { level: 3, min: 1800, max: 2200 },
            { level: 4, min: 2200, max: 2600 },
            { level: 5, min: 2600, max: 2600 }
        ]
    },
    bronze: {
        name: 'Bronze★',
        color: '#cd7f32',
        levels: [
            { level: 1, min: 3000, max: 3400 },
            { level: 2, min: 3400, max: 3800 },
            { level: 3, min: 3800, max: 4200 },
            { level: 4, min: 4200, max: 4600 },
            { level: 5, min: 4600, max: 4600 }
        ]
    },
    silver: {
        name: 'Silver★',
        color: '#c0c0c0',
        levels: [
            { level: 1, min: 5000, max: 5800 },
            { level: 2, min: 5800, max: 6600 },
            { level: 3, min: 6600, max: 7400 },
            { level: 4, min: 7400, max: 8200 },
            { level: 5, min: 8200, max: 8200 }
        ]
    },
    gold: {
        name: 'Gold★',
        color: '#ffd700',
        levels: [
            { level: 1, min: 9000, max: 9800 },
            { level: 2, min: 9800, max: 10600 },
            { level: 3, min: 10600, max: 11400 },
            { level: 4, min: 11400, max: 12200 },
            { level: 5, min: 12200, max: 12200 }
        ]
    },
    platinum: {
        name: 'Platinum★',
        color: '#a0b2c6',
        levels: [
            { level: 1, min: 13000, max: 14200 },
            { level: 2, min: 14200, max: 15400 },
            { level: 3, min: 15400, max: 16600 },
            { level: 4, min: 16600, max: 17800 },
            { level: 5, min: 17800, max: 17800 }
        ]
    },
    diamond: {
        name: 'Diamond★',
        color: '#4fc3f7',
        levels: [
            { level: 1, min: 19000, max: 20200 },
            { level: 2, min: 20200, max: 21400 },
            { level: 3, min: 21400, max: 22600 },
            { level: 4, min: 22600, max: 23800 },
            { level: 5, min: 23800, max: 23800 }
        ]
    },
    master: {
        name: 'Master',
        color: '#9c27b0',
        levels: [
            { level: 1, min: 25000, max: Infinity }
        ]
    }
};

// ============================================================================
// STATE & STORAGE
// ============================================================================
let records = [];
let currentMode = 'LR';
let editingRecordId = null;

function loadData() {
    const stored = localStorage.getItem('sf6_records');
    records = stored ? JSON.parse(stored) : [];
    updateDashboard();
    renderTable();
    renderChart();
}

function saveData() {
    localStorage.setItem('sf6_records', JSON.stringify(records));
}

// ============================================================================
// UTILITY FUNCTIONS
// ============================================================================
function getRankByLP(lp) {
    for (const [rankKey, rankData] of Object.entries(RANK_CONFIG)) {
        for (const level of rankData.levels) {
            if (lp >= level.min && lp <= level.max) {
                return {
                    rank: rankKey,
                    name: `${rankData.name}${level.level}`,
                    level: level.level,
                    min: level.min,
                    max: level.max,
                    color: rankData.color
                };
            }
        }
    }
    return null;
}

function formatLP(lp) {
    return lp.toLocaleString('ja-JP');
}

function showToast(message) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

// ============================================================================
// FORM FUNCTIONS
// ============================================================================
function setMode(mode) {
    currentMode = mode;
    document.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById(`btn-${mode.toLowerCase()}`).classList.add('active');
    
    const rankSection = document.getElementById('rank-lp-section');
    const cmFields = document.getElementById('cm-fields');
    const lpChartTabs = document.getElementById('lp-chart-tabs');
    const cmChartTabs = document.getElementById('cm-chart-tabs');
    
    if (mode === 'CM') {
        rankSection.classList.add('hidden');
        cmFields.classList.remove('hidden');
        lpChartTabs.classList.add('hidden');
        cmChartTabs.classList.remove('hidden');
    } else {
        rankSection.classList.remove('hidden');
        cmFields.classList.add('hidden');
        lpChartTabs.classList.remove('hidden');
        cmChartTabs.classList.add('hidden');
    }
}

function addQuickLP(amount) {
    const input = document.getElementById('input-lp');
    const current = parseInt(input.value) || 0;
    input.value = Math.max(0, current + amount);
    updateLPPreview();
}

function updateLPPreview() {
    const rank = document.getElementById('input-rank').value;
    const lp = parseInt(document.getElementById('input-lp').value) || 0;
    const preview = document.getElementById('lp-diff-preview');
    
    if (!rank) {
        preview.textContent = '';
        return;
    }
    
    const lastRecord = records
        .filter(r => r.rank === rank && r.mode !== 'CM')
        .sort((a, b) => new Date(b.date) - new Date(a.date))[0];
    
    if (lastRecord) {
        const diff = lp - lastRecord.lp;
        preview.textContent = diff > 0 ? `+${diff} LP` : `${diff} LP`;
        preview.style.color = diff > 0 ? '#00f0ff' : '#ef4444';
    }
}

function saveRecord() {
    const mode = currentMode;
    const date = document.getElementById('input-date').value;
    const char = document.getElementById('input-char').value;
    const memo = document.getElementById('input-memo').value;
    
    if (!date || !char) {
        showToast('日付とキャラクターを選択してください');
        return;
    }
    
    let record = {
        id: Date.now(),
        date,
        char,
        mode,
        memo
    };
    
    if (mode === 'CM') {
        const opponent = document.getElementById('input-opponent').value;
        const wins = parseInt(document.getElementById('input-cm-win').value) || 0;
        const loses = parseInt(document.getElementById('input-cm-lose').value) || 0;
        
        if (!opponent) {
            showToast('対戦相手を選択してください');
            return;
        }
        
        record.opponent = opponent;
        record.wins = wins;
        record.loses = loses;
    } else {
        const rank = document.getElementById('input-rank').value;
        const lp = parseInt(document.getElementById('input-lp').value);
        
        if (!rank || isNaN(lp) || lp < 0) {
            showToast('ランクとLPを正しく入力してください');
            return;
        }
        
        record.rank = rank;
        record.lp = lp;
    }
    
    records.push(record);
    saveData();
    clearForm();
    updateDashboard();
    renderTable();
    renderChart();
    showToast('記録を保存しました');
}

function clearForm() {
    document.getElementById('input-date').value = new Date().toISOString().split('T')[0];
    document.getElementById('input-char').value = '';
    document.getElementById('input-rank').value = '';
    document.getElementById('input-lp').value = '';
    document.getElementById('input-memo').value = '';
    document.getElementById('input-opponent').value = '';
    document.getElementById('input-cm-win').value = '0';
    document.getElementById('input-cm-lose').value = '0';
    document.getElementById('lp-diff-preview').textContent = '';
}

// ============================================================================
// DASHBOARD UPDATE
// ============================================================================
function updateDashboard() {
    // 現在のランク
    const lrRecords = records.filter(r => r.mode === 'LR').sort((a, b) => new Date(b.date) - new Date(a.date));
    
    if (lrRecords.length > 0) {
        const latest = lrRecords[0];
        const rankInfo = getRankByLP(latest.lp);
        
        if (rankInfo) {
            document.getElementById('current-rank-name').textContent = rankInfo.name;
            document.getElementById('current-lp-display').textContent = formatLP(latest.lp) + ' LP';
            document.getElementById('current-rank-icon').textContent = '★';
            document.getElementById('current-rank-icon').className = `rank-badge-inline rb-${rankInfo.rank}`;
        }
    }
    
    // 本日のLP変動
    const today = new Date().toISOString().split('T')[0];
    const todayRecords = lrRecords.filter(r => r.date === today);
    
    if (todayRecords.length > 0) {
        const first = todayRecords[todayRecords.length - 1].lp;
        const last = todayRecords[0].lp;
        const diff = last - first;
        
        document.getElementById('today-diff').textContent = diff > 0 ? '+' + diff : diff;
        document.getElementById('today-diff').className = diff > 0 ? 'diff-value up' : diff < 0 ? 'diff-value down' : 'diff-value zero';
        document.getElementById('today-sessions').textContent = `本日 ${todayRecords.length} セッション`;
    }
    
    // 総合LP変動
    if (lrRecords.length > 1) {
        const first = lrRecords[lrRecords.length - 1].lp;
        const last = lrRecords[0].lp;
        const totalDiff = last - first;
        
        document.getElementById('total-diff').textContent = totalDiff > 0 ? '+' + totalDiff : totalDiff;
        document.getElementById('total-diff').className = totalDiff > 0 ? 'diff-value up' : totalDiff < 0 ? 'diff-value down' : 'diff-value zero';
        
        // ランク進捗
        const currentRankInfo = getRankByLP(last);
        if (currentRankInfo) {
            const progress = ((last - currentRankInfo.min) / (currentRankInfo.max - currentRankInfo.min)) * 100;
            document.getElementById('rank-progress-bar').style.width = Math.min(progress, 100) + '%';
            document.getElementById('rank-progress-pct').textContent = Math.floor(progress) + '%';
        }
    }
}

// ============================================================================
// TABLE RENDERING
// ============================================================================
function renderTable() {
    const filterChar = document.getElementById('filter-char').value;
    const filterMode = document.getElementById('filter-mode').value;
    
    let filtered = records;
    
    if (filterChar) filtered = filtered.filter(r => r.char === filterChar);
    if (filterMode) filtered = filtered.filter(r => r.mode === filterMode);
    
    filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
    
    const tbody = document.getElementById('table-body');
    tbody.innerHTML = '';
    
    if (filtered.length === 0) {
        tbody.innerHTML = '<tr class="empty-state"><td colspan="8">記録がありません</td></tr>';
        return;
    }
    
    filtered.forEach(record => {
        const row = document.createElement('tr');
        
        let rankCell = '';
        let lpCell = '';
        let diffCell = '';
        
        if (record.mode === 'CM') {
            rankCell = `-`;
            lpCell = `-`;
            const winrate = record.wins + record.loses > 0 
                ? ((record.wins / (record.wins + record.loses)) * 100).toFixed(1)
                : 0;
            diffCell = `${record.wins}勝${record.loses}敗 (${winrate}%)`;
        } else {
            const rankInfo = getRankByLP(record.lp);
            rankCell = rankInfo ? `<span class="rank-badge-inline rb-${rankInfo.rank}">${rankInfo.level}</span> ${rankInfo.name}` : '-';
            lpCell = formatLP(record.lp) + ' LP';
            
            const prevRecord = records.filter(r => r.mode === record.mode && r.rank === record.rank && new Date(r.date) < new Date(record.date)).sort((a, b) => new Date(b.date) - new Date(a.date))[0];
            if (prevRecord) {
                const diff = record.lp - prevRecord.lp;
                diffCell = `<span class="diff-cell ${diff > 0 ? 'plus' : 'minus'}">${diff > 0 ? '+' : ''}${diff}</span>`;
            }
        }
        
        row.innerHTML = `
            <td>${record.date}</td>
            <td class="char-cell">${record.char}</td>
            <td><span class="mode-badge ${record.mode.toLowerCase()}">${record.mode}</span></td>
            <td>${rankCell}</td>
            <td>${lpCell}</td>
            <td>${diffCell}</td>
            <td class="memo-cell">${record.memo || '-'}</td>
            <td class="action-cell">
                <button class="btn-action edit" onclick="openEditModal(${record.id})"><i class="fas fa-edit"></i></button>
                <button class="btn-action delete" onclick="deleteRecord(${record.id})"><i class="fas fa-trash"></i></button>
            </td>
        `;
        
        tbody.appendChild(row);
    });
    
    // キャラクターフィルタを更新
    const chars = [...new Set(records.map(r => r.char))].sort();
    const charFilter = document.getElementById('filter-char');
    const currentValue = charFilter.value;
    charFilter.innerHTML = '<option value="">全キャラ</option>' + chars.map(c => `<option value="${c}">${c}</option>`).join('');
    charFilter.value = currentValue;
}

function deleteRecord(id) {
    if (confirm('この記録を削除しますか？')) {
        records = records.filter(r => r.id !== id);
        saveData();
        updateDashboard();
        renderTable();
        renderChart();
        showToast('記録を削除しました');
    }
}

function openEditModal(id) {
    editingRecordId = id;
    const record = records.find(r => r.id === id);
    
    if (!record) return;
    
    const form = document.getElementById('edit-form');
    form.innerHTML = '';
    
    const dateInput = document.createElement('div');
    dateInput.className = 'form-group';
    dateInput.innerHTML = `<label>日付</label><input type="date" id="edit-date" value="${record.date}">`;
    form.appendChild(dateInput);
    
    const charInput = document.createElement('div');
    charInput.className = 'form-group';
    charInput.innerHTML = `<label>キャラクター</label><input type="text" id="edit-char" value="${record.char}" readonly>`;
    form.appendChild(charInput);
    
    const modeInput = document.createElement('div');
    modeInput.className = 'form-group';
    modeInput.innerHTML = `<label>モード</label><input type="text" id="edit-mode" value="${record.mode}" readonly>`;
    form.appendChild(modeInput);
    
    if (record.mode === 'CM') {
        const oppInput = document.createElement('div');
        oppInput.className = 'form-group';
        oppInput.innerHTML = `<label>対戦相手</label><input type="text" id="edit-opponent" value="${record.opponent}" readonly>`;
        form.appendChild(oppInput);
        
        const winsInput = document.createElement('div');
        winsInput.className = 'form-group';
        winsInput.innerHTML = `<label>勝ち</label><input type="number" id="edit-wins" value="${record.wins}" min="0">`;
        form.appendChild(winsInput);
        
        const losesInput = document.createElement('div');
        losesInput.className = 'form-group';
        losesInput.innerHTML = `<label>負け</label><input type="number" id="edit-loses" value="${record.loses}" min="0">`;
        form.appendChild(losesInput);
    } else {
        const rankInput = document.createElement('div');
        rankInput.className = 'form-group';
        rankInput.innerHTML = `<label>ランク</label><input type="text" id="edit-rank" value="${record.rank}" readonly>`;
        form.appendChild(rankInput);
        
        const lpInput = document.createElement('div');
        lpInput.className = 'form-group';
        lpInput.innerHTML = `<label>LP</label><input type="number" id="edit-lp" value="${record.lp}" min="0">`;
        form.appendChild(lpInput);
    }
    
    const memoInput = document.createElement('div');
    memoInput.className = 'form-group';
    memoInput.innerHTML = `<label>メモ</label><textarea id="edit-memo" rows="2">${record.memo || ''}</textarea>`;
    form.appendChild(memoInput);
    
    document.getElementById('edit-modal').classList.remove('hidden');
}

function saveEditedRecord() {
    const record = records.find(r => r.id === editingRecordId);
    if (!record) return;
    
    record.date = document.getElementById('edit-date').value;
    record.memo = document.getElementById('edit-memo').value;
    
    if (record.mode === 'CM') {
        record.wins = parseInt(document.getElementById('edit-wins').value) || 0;
        record.loses = parseInt(document.getElementById('edit-loses').value) || 0;
    } else {
        record.lp = parseInt(document.getElementById('edit-lp').value) || 0;
    }
    
    saveData();
    closeEditModal();
    updateDashboard();
    renderTable();
    renderChart();
    showToast('記録を更新しました');
}

function closeEditModal() {
    document.getElementById('edit-modal').classList.add('hidden');
    editingRecordId = null;
}

// ============================================================================
// CHART RENDERING
// ============================================================================
let chart = null;

function renderChart() {
    const lrRecords = records.filter(r => r.mode === 'LR').sort((a, b) => new Date(a.date) - new Date(b.date));
    
    if (lrRecords.length === 0) {
        if (chart) chart.destroy();
        document.getElementById('lp-chart').style.display = 'none';
        return;
    }
    
    document.getElementById('lp-chart').style.display = 'block';
    
    const labels = lrRecords.map(r => r.date);
    const data = lrRecords.map(r => r.lp);
    
    const ctx = document.getElementById('lp-chart').getContext('2d');
    
    if (chart) chart.destroy();
    
    chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels,
            datasets: [{
                label: 'LP推移',
                data,
                borderColor: '#ff6a00',
                backgroundColor: 'rgba(255, 106, 0, 0.1)',
                tension: 0.4,
                fill: true,
                pointBackgroundColor: '#00f0ff',
                pointBorderColor: '#ff6a00',
                pointRadius: 4,
                pointHoverRadius: 6
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    labels: { color: '#f0f2f7', font: { size: 12 } }
                }
            },
            scales: {
                y: {
                    beginAtZero: false,
                    ticks: { color: '#9aa0b0' },
                    grid: { color: 'rgba(255, 255, 255, 0.05)' }
                },
                x: {
                    ticks: { color: '#9aa0b0' },
                    grid: { color: 'rgba(255, 255, 255, 0.05)' }
                }
            }
        }
    });
}

function setChartRange(range, btn) {
    document.querySelectorAll('#lp-chart-tabs .tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    // チャートレンジ変更ロジックはここに追加
    renderChart();
}

function setCMChartView(view, btn) {
    document.querySelectorAll('#cm-chart-tabs .tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    // CM チャートビュー変更ロジックはここに追加
}

// ============================================================================
// MODAL FUNCTIONS
// ============================================================================
function openDateClearModal() {
    document.getElementById('date-clear-modal').classList.remove('hidden');
}

function closeDateClearModal() {
    document.getElementById('date-clear-modal').classList.add('hidden');
}

function clearDateRange() {
    const startDate = document.getElementById('clear-start-date').value;
    const endDate = document.getElementById('clear-end-date').value;
    
    if (!startDate || !endDate) {
        showToast('開始日と終了日を入力してください');
        return;
    }
    
    if (confirm(`${startDate} から ${endDate} までの記録を削除しますか？`)) {
        records = records.filter(r => {
            const recordDate = r.date;
            return recordDate < startDate || recordDate > endDate;
        });
        
        saveData();
        closeDateClearModal();
        updateDashboard();
        renderTable();
        renderChart();
        showToast('期間内の記録を削除しました');
    }
}

function clearAllData() {
    if (confirm('すべてのデータを削除しますか？この操作は取り消せません。')) {
        records = [];
        saveData();
        updateDashboard();
        renderTable();
        renderChart();
        showToast('すべてのデータを削除しました');
    }
}

function exportCSV() {
    if (records.length === 0) {
        showToast('エクスポートするデータがありません');
        return;
    }
    
    let csv = 'date,char,mode,rank,lp,opponent,wins,loses,memo\n';
    
    records.forEach(r => {
        csv += `"${r.date}","${r.char}","${r.mode}","${r.rank || ''}","${r.lp || ''}","${r.opponent || ''}","${r.wins || ''}","${r.loses || ''}","${r.memo || ''}"` + '\n';
    });
    
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `sf6-lp-tracker-${new Date().toISOString().split('T')[0]}.csv`;
    a.click();
}

    loadData();
    setMode('LR');
});
